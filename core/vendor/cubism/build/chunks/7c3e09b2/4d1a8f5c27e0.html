var MORPH_E='cubic-bezier(.3,1.08,.32,1)',MORPH_D=400,morphBusy=false;
var MORPH_OD=260,MORPH_CD=200;
/* 就地淡入放大 / 淡出缩小——不再「收缩回按钮」，杜绝关闭时方块残留、露馅 */
function morphOpen(boxId,srcSel){
  if(reducedMotion())return;
  var box=document.getElementById(boxId);if(!box)return;
  var bs=box.style,origTransition=bs.transition,origTransform=bs.transform,origOpacity=bs.opacity,origWill=bs.willChange,origOrigin=bs.transformOrigin;
  bs.transition='none';bs.transformOrigin='50% 44%';bs.willChange='transform,opacity';
  bs.opacity='0';bs.transform='scale(.94)';
  box.offsetWidth;
  bs.transition='transform '+MORPH_OD+'ms '+MORPH_E+',opacity '+Math.round(MORPH_OD*0.72)+'ms ease-out';
  bs.opacity='1';bs.transform='scale(1)';
  morphLock++;
  var fin1=false;
  function finOpen(){if(fin1)return;fin1=true;box.removeEventListener('transitionend',teOpen);
    bs.transition=origTransition;bs.transform=origTransform;bs.opacity=origOpacity;bs.willChange=origWill;bs.transformOrigin=origOrigin;
    morphLock--;morphFlush();}
  function teOpen(e){if(e.target===box&&e.propertyName==='transform')finOpen();}
  box.addEventListener('transitionend',teOpen);
  setTimeout(finOpen,MORPH_OD+140);
}
function morphClose(boxId,srcSel,done){
  var box=document.getElementById(boxId);
  if(reducedMotion()||!box||morphBusy){done();return;}
  morphBusy=true;morphLock++;
  var bs=box.style;
  bs.transition='none';bs.transformOrigin='50% 44%';bs.willChange='transform,opacity';bs.pointerEvents='none';
  bs.transform='scale(1)';bs.opacity='1';
  box.offsetWidth;
  bs.transition='transform '+MORPH_CD+'ms cubic-bezier(.4,0,.9,1),opacity '+MORPH_CD+'ms ease-in';
  bs.opacity='0';bs.transform='scale(.95)';
  var fin2=false;
  function finClose(){if(fin2)return;fin2=true;box.removeEventListener('transitionend',teClose);
    box.style.opacity='0';box.style.visibility='hidden';
    morphBusy=false;morphLock--;done();morphFlush();}
  function teClose(e){if(e.target===box&&(e.propertyName==='opacity'||e.propertyName==='transform'))finClose();}
  box.addEventListener('transitionend',teClose);
  setTimeout(finClose,MORPH_CD+120);
}

/* 视线跟随:鼠标/手指位置 → 以岛上人脸为锚点换算注视向量,节流 66ms 转发给三位立绘(眼珠+转头+倾身) */
var LOOK={t:0};
function lookAt(px,py){
  var now=Date.now();if(now-LOOK.t<(MOB?140:66))return;LOOK.t=now;
  if(!VN.on||VN.zz)return;
  var isle=$id('zjSceneIsle');if(!isle)return;
  var r=isle.getBoundingClientRect();if(!r.width)return;
  var nx=Math.max(-0.5,Math.min(0.5,(px-(r.left+r.width/2))/(Math.max(320,window.innerWidth)*0.6)));
  var ny=Math.max(-0.5,Math.min(0.5,(py-(r.top+r.height*0.35))/(Math.max(320,window.innerHeight)*0.6)));
  ['m','k','s'].forEach(function(w){send(w,{act:'look',x:nx,y:ny});});
}
document.addEventListener('pointermove',function(e){lookAt(e.clientX,e.clientY);},{passive:true});
/* 点到三叶身上:随机 开枪一整套(举枪-瞄准-怼脸开火-收枪) 或 挥手打招呼 */
document.addEventListener('click',function(e){
  if(!VN.on||VN.zz)return;
  var t=e.target;
  if(t&&t.closest&&t.closest('#vnCtl,#vnPill,[data-act],[data-ov],[data-vnact],button,input,textarea'))return;
  if(!(t&&t.closest&&t.closest('#zjSceneIsle')))return;
  var isle=$id('zjSceneIsle');if(!isle)return;
  var r=isle.getBoundingClientRect();if(!r.width)return;
  var st=VN.sizeKey||'S';
  var sp=st==='F'?0.64:(st==='B'?0.44:0.19);          /* 当前取景窗跨度(画布高度占比) */
  var cx=r.left+r.width/2+((VN.posKey&&st!=='S')?0.19*r.width:0);  /* 有客让位时人物中心右移 */
  var bw=560*(r.height/(2850*sp));                     /* 躯干显示宽度≈画布560px×当前缩放 */
  if(Math.abs(e.clientX-cx)>Math.max(56,bw/2))return;
  var now=Date.now();if(now-(VN.pokeT||0)<1800)return;VN.pokeT=now;
  send('m',{act:Math.random()<0.5?'gunKill':'wave'});
},true);
document.addEventListener('touchmove',function(e){var t=e.touches&&e.touches[0];if(t)lookAt(t.clientX,t.clientY);},{passive:true});
document.addEventListener('touchstart',function(e){var t=e.touches&&e.touches[0];if(t){LOOK.t=0;lookAt(t.clientX,t.clientY);}},{passive:true});
/* 手机端专属:仅当手指按在屏上 或 正在打字时,三叶才看向手指方向;松手/收起键盘→回正视前方
   (手机一直被手指刷,若持续跟随三叶就永远低头不抬;电脑端 MOB=false 完全不走这段) */
if(MOB){
  var _lookRst=0;
  function faceFront(){['m','k','s'].forEach(function(w){send(w,{act:'look',x:0,y:0,slow:1});});}  /* 松手:带 slow,立绘用长过渡缓缓转回 */
  function frontSoon(){clearTimeout(_lookRst);_lookRst=setTimeout(function(){
    var ae=document.activeElement;
    if(ae&&(ae.tagName==='TEXTAREA'||ae.tagName==='INPUT'))return;      /* 还在打字→保持看输入方向,不回正 */
    faceFront();
  },260);}
  document.addEventListener('touchend',function(e){if(!(e.touches&&e.touches.length))frontSoon();},{passive:true});
  document.addEventListener('touchcancel',function(){frontSoon();},{passive:true});
  document.addEventListener('input',function(e){var t=e.target;if(t&&(t.tagName==='TEXTAREA'||t.tagName==='INPUT')){clearTimeout(_lookRst);var r=t.getBoundingClientRect();lookAt(r.left+r.width/2,r.top+r.height*0.4);}},{passive:true});
  document.addEventListener('focusout',function(e){var t=e.target;if(t&&(t.tagName==='TEXTAREA'||t.tagName==='INPUT'))frontSoon();},{passive:true});
  setTimeout(faceFront,700);   /* 进场先正视,别一开始就盯着某处 */
}

  }catch(e){}
}

/* ---------------- 口型驱动:说话时每帧算「张嘴度0~1」发给三叶 ----------------
   TTS→实时音量;纯文字(流式/打字机)→吐字节奏。角色端把 0~1 映射到 闭/微张/张。 */
VN.mo={timer:0,actx:null,ana:null,src:null,buf:null,srcEl:null,lastPos:-1,open:0};
function mouthStop(){var M=VN.mo;if(M.timer){clearInterval(M.timer);M.timer=0;}send('m',{act:'mouth',v:0});}
function ttsRms(E){
  try{
    var M=VN.mo, a=E.TTSP&&E.TTSP.audio; if(!a)return null;
    if(!M.actx){var AC=window.AudioContext||window.webkitAudioContext;if(!AC)return null;
      M.actx=new AC();M.ana=M.actx.createAnalyser();M.ana.fftSize=256;
      M.buf=new Uint8Array(M.ana.frequencyBinCount);M.ana.connect(M.actx.destination);}
    if(M.actx.state==='suspended'){M.actx.resume();return null;}  /* 未激活先别接线,免得TTS静音 */
    if(M.srcEl!==a){try{M.src=M.actx.createMediaElementSource(a);M.src.connect(M.ana);}catch(e){}M.srcEl=a;}
    M.ana.getByteTimeDomainData(M.buf);
    var sm=0;for(var i=0;i<M.buf.length;i++){var d=(M.buf[i]-128)/128;sm+=d*d;}
    return Math.min(1,Math.sqrt(sm/M.buf.length)*3.4);
  }catch(e){return null;}
}
function mouthTick(){                        /* setInterval 33ms 驱动 */
  var M=VN.mo;
  if(!VN.talk){mouthStop();return;}
  try{
    var E=ENG(), now=performance.now();
    /* TTS:真实音量驱动(大张频率由角色端限制) */
    if(E&&E.TTSP&&E.TTSP.playing){ var r=ttsRms(E); if(r!=null)send('m',{act:'mouth',v:+r.toFixed(2)}); return; }
    /* 纯文字:按语速一开一合翻嘴(不是每个字都张),每4-6次微张才请求一次大张 */
    var box=$id('zjTypeBox'), T=E&&E.TYPE;
    if(box&&T){
      var pos=T.pos|0;
      if(pos!==M.lastPos){ M.lastPos=pos; M.lastAdv=now; }
      if(now-(M.lastAdv||0)>=260){ M.cur=0; send('m',{act:'mouth',v:0}); return; }  /* 停顿/说完→闭嘴 */
      if(now>=(M.nextFlap||0)){
        M.nextFlap=now+120+Math.random()*80;             /* ~120-200ms 一开一合=语速 */
        if(M.cur>0.1){ M.cur=0; }                        /* 收:闭一下(制造独立的一次微张) */
        else {
          M.flapN=(M.flapN||0)+1;
          if(M.flapN>=(M.need||5)){ M.flapN=0; M.need=4+((Math.random()*3)|0); M.cur=0.9; } /* 攒够→请求大张(角色端做成快速) */
          else M.cur=0.28+Math.random()*0.28;                                /* 微张 */
        }
      }
      send('m',{act:'mouth',v:M.cur});
    }
  }catch(e){}
}

/* ---------------- 场景状态机 ---------------- */
function panelNow(){var E=ENG();try{return E?E.currentPanel():null;}catch(e){return null;}}
/* 情绪:从 MVU 面板(无聊/诅咒/人格)推断三叶心境,驱动立绘头姿+色调 */
function moodOf(){
  var p=panelNow(); var c=(p&&p.char)||{};
  var bore=parseInt(c['无聊'],10)||0, curse=parseInt(c['诅咒'],10)||0, per=c['人格']||'';
  function pv(k){var m=new RegExp(k+'\\D*(\\d+)').exec(per);return m?parseInt(m[1],10):0;}
  var steady=pv('稳健'), fun=pv('享乐'), rad=pv('激进');
  if(curse>=55 || (rad>=40&&rad>steady&&rad>fun)) return 'intense';
  if(bore>=68) return 'listless';
  if(fun>steady&&fun>rad) return 'playful';
  return 'neutral';
}
function sceneOf(){
  var p=panelNow();
  if(!p)return 'bg_rose';                              /* 开局/无档案:蓝玫瑰 */
  var w=p.world||{}; var npcs=p.npcs||[]; var c=p.char||{};
  var loc=String(w['时地']||''), wx=String(w['天气']||''), sit=String(w['剧场']||'')+' '+String(w['大势']||'');
  var inr=loc+' '+String(c['记录']||'')+' '+String(c['心念']||'')+' '+String(c['观瞻']||'');
  if(/革命爆发|起义|恐怖时代|断头台|共和国成立/.test(sit))VN.rev=true;
  /* 内心世界·梦境·意识场景 → 黑玫瑰 */
  if(/内心|心象|心念阁|梦境|梦中|入梦|噩梦|意识深处|精神世界|冥想|冥界|识海|幻境|心之壁|回忆深处|独白之/.test(loc))return 'bg_rose';
  /* 苏醒·睁眼·沉睡(开局一等独处内心时刻) → 黑玫瑰 */
  if(/苏醒|甦醒|睁开眼|睁开了眼|沉睡十年|沉睡多年|长眠初醒/.test(inr))return 'bg_rose';
  if(/议会|议事|议场|国民公会|议院|公会大厅/.test(loc))return 'bg_parliament';
  if(/街|广场|市集|码头|港口|城门|路上|途中|野外|营地|战场|阵地|桥|门前|巷/.test(loc))
    return VN.rev?'bg_city_rev':'bg_city';
  if(!npcs.length)return 'bg_rose';                    /* 独自一人:蓝玫瑰 */
  if(/夜|晚|深夜|子夜|凌晨|入夜/.test(loc))return 'bg_win_night';
  if(/黄昏|傍晚|夕|暮|日落|晚霞/.test(loc))return 'bg_win_dusk';
  return 'bg_win_day';                                 /* 默认:白日窗景 */
}

/* ---------------- 在场之人 → 进出场与三叶让位 ---------------- */
function presence(){
  var p=panelNow(); var npcs=p?(p.npcs||[]):[];
  var names=npcs.map(function(n){return String(n.name||'');});
  var hasK=names.some(function(n){return n.indexOf('克萝内')>=0;});
  var hasS=names.some(function(n){return n.indexOf('桑德拉')>=0;});
  var key=(hasK?'K':'')+(hasS?'S':'');
  if(key!==VN.posKey){
    VN.posKey=key;
    var k=chr('k'),s2=chr('s'),m3=chr('m');
    function lazyShow(f,on,lx){
      if(!f)return;
      if(on&&!f.getAttribute('src'))f.setAttribute('src',vnUrl(f));
      f.style.opacity=on?1:0;
      f.style.visibility=on?'visible':'hidden';
      if(lx!=null)f.style.left=lx;
    }
    lazyShow(k,hasK,hasK&&hasS?'0%':'2%');
    lazyShow(s2,hasS,hasK&&hasS?'15%':'4%');
    send('m',{act:'pos',x:((hasK||hasS)&&VN.sizeKey!=='S')?'right':'center'});   /* 有客:三叶平移让位到右侧(小窗特写时恒居中) */
  }
  return {names:names,npcs:npcs};
}

/* ---------------- 挥手:新人到场 / 心向≥80 ---------------- */
function greetCheck(pr){
  var isNew=false,hi=false;
  if(VN.prevNames){
    isNew=pr.names.some(function(n){return n&&VN.prevNames.indexOf(n)<0;});
    hi=pr.npcs.some(function(n){var seen=VN.favorSeen[n.name]||0;return (n.favor||0)>=80&&seen<80;});
  }
  VN.prevNames=pr.names;
  pr.npcs.forEach(function(n){VN.favorSeen[n.name]=Math.max(VN.favorSeen[n.name]||0,n.favor||0);});
  if(isNew||hi)send('m',{act:'wave'});
}

/* ---------------- 剧情雷达(流式逐字识别) + 导演指令 ---------------- */
var RX_KILL=/杀了|杀死|射杀|击毙|饮弹|处决|处刑|枪决|绞死|斩首|刺死|毒死|勒死|扣下扳机|枪口喷出|一枪毙|溅上鲜血|头颅落|铡刀落/;
var RX_DIE=/(我|三叶)[^。]{0,10}(死了|断了气|咽了气|失去意识再也|倒在血泊|心脏停|没了呼吸)|意识沉入黑暗|视野彻底变黑/;
var RX_SKY=/鸣枪|朝天开|对空(开|鸣)|示警的枪|革命爆发|起义爆发|暴动爆发|宣战|开战|战争(爆发|开始)|震慑全场|威慑/;
function radar(seg){
  var now=Date.now();
  if(now-VN.lastFire<6000)return;
  if(RX_KILL.test(seg)||RX_DIE.test(seg)){VN.lastFire=now;VN.firedTurn=true;send('m',{act:'gunKill'});}
  else if(RX_SKY.test(seg)){
    VN.lastFire=now;VN.firedTurn=true;send('m',{act:'skyFire'});
    if(/革命爆发|起义爆发/.test(seg))VN.rev=true;
  }
}
function director(){                        /* 面板 ◇剧场 标签(AI 自报,最高优先兜底) */
  if(VN.firedTurn)return;
  var p=panelNow(); if(!p)return;
  var tag=String((p.world||{})['剧场']||'');
  if(!tag||/^无/.test(tag))return;
  if(/杀|死/.test(tag))send('m',{act:'gunKill'});
  else if(/革命|战争|威慑|鸣枪/.test(tag)){send('m',{act:'skyFire'});if(/革命/.test(tag))VN.rev=true;}
  else if(/挥手|打招呼/.test(tag))send('m',{act:'wave'});
}

/* ---------------- 主循环(250ms 轮询,零引擎侵入) ---------------- */
function lastWorld(){

  for(var i=h.length-1;i>=0;i--)if(h[i].role==='world')return h[i];

function tick(){
  /* 只认「位置在顶部区域·尺寸达标」的岛，忽略转场瞬间残留/错位的同 id 岛(否则角色层会被定到屏幕底部只露头顶) */
  var isle=null;{var _iss=document.querySelectorAll('[id="zjSceneIsle"]');for(var _ii=0;_ii<_iss.length;_ii++){var _ir=_iss[_ii].getBoundingClientRect();if(_ir.width>=60&&_ir.height>=60&&_ir.top<window.innerHeight*0.55){isle=_iss[_ii];break;}}}

  if(VN.unhide){
    if(isle)VN.unhide=false;
    else{var mi=$id('zjMiniIsle');if(mi&&mi.getAttribute('data-act')==='show3d')mi.click();}
  }
  /* 迷你入口:VN 关着且岛在 → 显示「剧场」药丸 */

    var r0=isle.getBoundingClientRect();

    pill.style.left=(r0.left+10)+'px'; pill.style.top=(r0.top+6)+'px';
  }else pill.style.display='none';
  var E9=ENG();
  if(E9&&E9.S&&(E9.S.overlay||E9.S.bgmOpen)){root.style.display='none';pill.style.display='none';setZZ(true);return;}  /* 弹窗(世界书/设置/地图/音乐…)打开:剧场层让位 */
  if(!VN.on||!isle){root.style.display='none';setZZ(true);return;}

  if(r.width<60||r.height<60){root.style.display='none';setZZ(true);return;}
  root.style.display='block';
  setZZ(!!document.hidden);
  if(!VN.ld){VN.ld=true;var mf0=chr('m');if(mf0&&!mf0.getAttribute('src')){mf0.addEventListener('load',function(){VN.sizeKey=null;});mf0.setAttribute('src',vnUrl(mf0));}}
  var _rk=r.left+','+r.top+','+r.width+','+r.height;
  if(VN._rk!==_rk){VN._rk=_rk;
    root.style.left=r.left+'px';root.style.top=r.top+'px';
    root.style.width=r.width+'px';root.style.height=r.height+'px';
    try{root.style.borderRadius=getComputedStyle(isle).borderRadius;}catch(e){}
  }
  ctlRefresh();

  /* galgame 取景三档(画布高度百分比,头顶≈40/胸≈58/膝·靴口≈82/足≈99):
     小窗=特写(头~胸,露出上身一半)、展开=框沿及膝、全屏=全身落地。
     取景由立绘 iframe 内部按窗口缩放平移——横竖屏、任意框宽一律成立 */
  var E0=ENG();
  var vSt=E0&&E0.S?(E0.S.worldFull?'F':(E0.S.isleBig?'B':'S')):'S';
  VN.tk=(VN.tk||0)+1;
  if(VN.sizeKey!==vSt||VN.tk%8===0){VN.sizeKey=vSt;
    var W9=vSt==='F'?[36,100]:(vSt==='B'?[38,82]:[39,58]);
    send('m',{act:'frame',a:W9[0],b:W9[1]});
    send('m',{act:'pos',x:(VN.posKey&&vSt!=='S')?'right':'center'});
    /* 同伴与三叶同比例:三叶窗 [39,58]/[38,82]/[36,100] 覆盖身体的比例,换算到同伴画布(头≈0/脚≈100) */

    ['k','s'].forEach(function(w){send(w,{act:'frame',a:WC[0],b:WC[1]});});

    [kz,sz].forEach(function(f){if(!f)return;f.style.height='100%';f.style.bottom='0';});
  }

  /* 说话 = 打字机正在打 或 TTS 在诵读 */
  var typing=!!$id('zjTypeBox');
  var E=ENG();
  var tts=!!(E&&E.TTSP&&E.TTSP.playing);
  var talk=typing||tts;
  if(talk!==VN.talk){VN.talk=talk;send('m',{act:'talk',on:talk});
    if(talk){VN.mo.lastPos=-1;VN.mo.cur=0;VN.mo.flapN=0;VN.mo.nextFlap=0;if(!VN.mo.timer)VN.mo.timer=setInterval(mouthTick,33);}
    else mouthStop();}

  /* 和文原稿直播:镜像岛底下的 jpIslePane 叠在剧场上。
     展开/全屏=有稿就常显(可回读);小窗=仅生成中直播,不挡平时的立绘 */
  var jp=$id('vnJp'), jpSrc=$id('jpIslePane');
  if(jp){
    var jt=jpSrc?jpSrc.textContent:'';
    var sBig=!!(E&&E.S&&(E.S.isleBig||E.S.worldFull));
    var sThk=!!(E&&E.S&&E.S.thinking);
    var jShow=jt&&jt!=='（此幕暂无和文原稿）'&&(sBig||sThk);
    if(jShow){
      if(jp.__t!==jt){jp.__t=jt;jp.textContent=jt;jp.scrollTop=jp.scrollHeight;}
      jp.style.display='block';
    }else jp.style.display='none';
  }

  /* 剧情雷达:只扫「正在生成/正在打字」的活体消息,已定稿的旧史不扫 */
  var lw=lastWorld();
  if(lw){
    if(lw!==VN.scanMsg){VN.scanMsg=lw;VN.scanLen=0;VN.firedTurn=false;}
    var live=(E&&E.S&&(E.S.thinking||E.S._stream))||!lw.panel;
    var tw=null;
    try{tw=(E&&E.TYPE&&E.TYPE.msg===lw&&E.typedSet&&!E.typedSet.has(lw))?E.TYPE.pos:null;}catch(e){}
    var revealed=null;
    if(tw!=null){var _t=E.stripMvu(lw.text||'');revealed=_t.slice(0,Math.min(_t.length,tw+24));}
    else if(live&&E){revealed=E.stripMvu(lw.text||'');}
    if(revealed!=null&&revealed.length>VN.scanLen){
      var seg=revealed.slice(Math.max(0,VN.scanLen-14));
      VN.scanLen=revealed.length;
      radar(seg);
    }
    /* 回合定稿:面板已到 & 引擎空闲 → 场景/在场/挥手/导演指令 */
    var idle=!(E&&E.S&&(E.S.thinking||E.S._stream));
    if(idle&&lw.panel&&VN.doneFor!==lw){
      var isFirst=(VN.doneFor===null&&VN.first);
      VN.doneFor=lw;VN.first=false;
      var pr=presence();
      setBg(sceneOf());
      var em=moodOf(); if(em!==VN.moodCur){VN.moodCur=em;send('m',{act:'mood',e:em});}
      if(!isFirst){greetCheck(pr);director();}
      else{VN.prevNames=pr.names;pr.npcs.forEach(function(n){VN.favorSeen[n.name]=n.favor||0;});}
    }
  }else{
    /* 尚无世界消息(刚开局):玫瑰 + 三叶居中 */
    setBg('bg_rose');
    if(VN.posKey!==''){VN.posKey='';send('m',{act:'pos',x:'center'});
      ['k','s'].forEach(function(w){var f=chr(w);if(f){f.style.opacity=0;f.style.visibility='hidden';}});}
  }
}
setInterval(function(){try{tick();}catch(e){}},250);
})();
</script>
<script>
/* ═══ S9 OPS.TERM 运行时小层（ui_spec_final §9/§10/§12-1/§7.4）═══ */
(function(){
/* 1) 正文列反蒙版：resize/侧栏开合时把 storyPane 水平区间写进 --storyL/--storyR（一次 style 写操作，§12-1） */
function storyMask(){
  try{
    var el=document.getElementById('zjStory'),rs=document.documentElement.style;
    if(!el){rs.setProperty('--storyL','0%');rs.setProperty('--storyR','100%');return;}
    var r=el.getBoundingClientRect(),w=window.innerWidth||1;
    rs.setProperty('--storyL',Math.max(0,(r.left/w*100)).toFixed(1)+'%');
    rs.setProperty('--storyR',Math.min(100,(r.right/w*100)).toFixed(1)+'%');
  }catch(e){}
}
window.__zjStoryMask=storyMask;
var _smT=null;
window.addEventListener('resize',function(){clearTimeout(_smT);_smT=setTimeout(storyMask,180);});
setTimeout(storyMask,600);setInterval(storyMask,4000); /* 兜底：渲染重建 #zjStory 后自校 */
/* 2) 现实层/警报态引擎钩子：UI 绝不自行猜层（§9.1），只暴露 setter 给面板线调用 */
window.gitsLayer=function(l){ /* ''|'dive'|'para' */
  var de=document.documentElement,cur=de.getAttribute('data-layer')||'';
  l=l||'';if(l===cur)return;
  var rm=false;try{rm=matchMedia('(prefers-reduced-motion: reduce)').matches;}catch(e){}
  if(rm||de.classList.contains('zjLow')){if(l)de.setAttribute('data-layer',l);else de.removeAttribute('data-layer');return;}
  /* 断线重扫（§9.2）：180ms 压扁→黑场帧变量重绑定→400ms 重扫描 */
  var zj=document.getElementById('zj');
  if(zj){zj.classList.add('zjCrtOff');}
  setTimeout(function(){
    if(l)de.setAttribute('data-layer',l);else de.removeAttribute('data-layer');
    if(zj){zj.classList.remove('zjCrtOff');zj.classList.add('zjScanIn');
      var line=document.createElement('div');line.className='zjScanLine';document.body.appendChild(line);
      setTimeout(function(){try{line.remove();}catch(e){}zj.classList.remove('zjScanIn');},420);}
  },200);
};
window.gitsAlert=function(n){ /* 0|1|2|3（§10 触发表由引擎解析后调用） */
  var de=document.documentElement;
  if(n>0)de.setAttribute('data-alert',String(n));else de.removeAttribute('data-alert');
};
/* 3) 全屏撕裂（§7.3 白名单：强制切断/被分岔/已分接!）：配额制，冷却 6s */
var _tearLast=0;
window.gitsTear=function(){
  var rm=false;try{rm=matchMedia('(prefers-reduced-motion: reduce)').matches;}catch(e){}
  if(rm)return;var now=Date.now();if(now-_tearLast<6000)return;_tearLast=now;
  var d=document.createElement('div');d.id='zjTearFx';document.body.appendChild(d);
  d.addEventListener('animationend',function(){try{d.remove();}catch(e){}});
  setTimeout(function(){try{d.remove();}catch(e){}},900);
};
/* 4) 运行时降档保险丝（§7.4）：连续 3 帧 rAF>32ms → 本局临时 zjLow（不写盘） */
(function(){
  if(document.documentElement.classList.contains('zjLow'))return;
  var slow=0,last=0,n=0;
  function probe(t){
    if(last){var dt=t-last;if(dt>32){if(++slow>=3){document.documentElement.classList.add('zjLow');return;}}else slow=0;}
    last=t;if(++n<600)requestAnimationFrame(probe); /* 只在开局前 ~10s 侦测 */
  }
  setTimeout(function(){requestAnimationFrame(probe);},3000);
})();
})();
</script>

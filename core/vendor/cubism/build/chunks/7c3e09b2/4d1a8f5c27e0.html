0,"prob":100},{"cat":"案件","title":"案件|办案流程范式","keys":["立案","办案流程"],"keys2":["9课"],"content":"9课办案的标准弧线，供AI生成与推进案件时套用。①风闻——线人（韩方情报源、酒场、黑市）、他省厅委托、监听截获或媒体异动；②立案——荒卷做政治风险评估，定接案名义（反恐、人质救出、“国际协力”）与对外口径；③侦查——石川的电子战溯源与档案检索、斋藤与帕兹的外围监视、假扮警察或卧底摸底，必要时长时间蹲守（32小时无换班是常态）；④突入——素子小队加攻壳车强袭，热光学迷彩、有线无线接续的权衡先行；⑤收束——逮捕、灭口或政治交易三选一，涉外案常以驱逐、引渡收场；⑥归档——书面报告（队内最嫌恶的杂活，常被推给巴特）、“个人意见”栏、无报道化处理。每一环都可能被上层政治扭曲：假情报、测试、甩锅结构是常态；AI应允许玩家在任一环节介入或翻盘。","order":100,"prob":100},{"cat":"案件","title":"案件|悬案钩子·甲","keys":["悬案","未结案"],"content":"〔补完〕开放悬案：都心停车场连环义体窃取案。2029年夏起，新浜都心多层停车场连发同手法案件：独行的全身义体者被短促强电击放倒，义体整具被运走，仅存的脑壳被留在车内并接上简易维生电源——手法显示犯人熟知义体构造，且刻意“不背命案”。与同年年中某医院十八具义体失窃案（已另案）是否同流，县警未有结论；赃物疑经黑市翻新工房洗白转卖，保险公司调查员与警方均无突破，卷宗积压在9课“待认领”一栏。可作自由发挥的开放案件：幕后可设为盗卖集团、器官义体混卖链，或指向更深的特定买主。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":100},{"cat":"案件","title":"案件|悬案钩子·乙","keys":["幽灵信号","怪谈案件"],"content":"〔补完〕开放怪谈：深夜公话网的“无主呼叫”。凌晨二时至四时，市内多处公用电话在无来电记录的情况下自行响铃；接听者多数只听到载波静噪，少数电脑化者报告“像脑内通信却没有发信方”的低语感，事后出现轻度头痛，或梦见不属于自己的记忆片段。电话局查线结论：该呼叫在交换网内不存在。都市传说已有“亡者回线”“网络那头有人”等版本流传；技术层面可解释为老旧模拟干线串扰、黑客的中继试验，或某种在线路间游走之物。规模小、无实际受害者，警方不立案。AI可将其引向任意方向——恶作剧、犯罪前兆、或真正的未知。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":100},{"cat":"案件","title":"案件|序章·背景","keys":["密谈","叛逃次官","硅矿"],"content":"2029年3月，新浜市。极东通商代表部——某社会主义大国的驻日通商机构——与日方人士围绕“硅矿床”利权秘密交涉：以矿产权益换取日本对该国“不承认分离独立”政策的不干涉默认，款项经第三国走账。桌边话语露骨：“奴隶国家断供则主人国家挨饿”“慢性人力短缺让奴隶制造产业受益”——利权与人口买卖的暗盘。在场者：红色墨镜的代表部外交官、工会干部、白发老妇，以及商务省助理次官伊藤——此人另有一层暗流：已秘密向对方申请政治庇护，宣誓书在案，安排与外交官同乘俄航（Aeroflot）离境。外务省与自卫队对这条线监控已久，只待证据足以摊牌。会场设于湾岸高层建筑，警方以“恐怖袭击预告”名义疏散周边街区——那一夜的多方博弈由此铺开。","order":100,"prob":100},{"cat":"案件","title":"案件|序章·爆杀案余波","keys":["泄密","次官嫌疑"],"content":"正篇开始前的近过去，前首相死于爆杀。案件核心谜团是泄密：袭击者精确掌握了前首相的会议地点，泄密链经调查指向商务省高层——助理次官伊藤浮为最大嫌疑人，公安需要他出席听证会作证“是谁泄露了会议地点”。此案令省厅间猜忌公开化：外务省、自卫队各自布线监控，公安内部亦有派系想借案做局。前首相一系的旧势力仍在暗处运作，其影响力并未随本人死亡消散。对叙事的用法：2029年3月的密谈突袭案表面是防谍执法，底层驱动正是这桩爆杀案的余波——谁握有伊藤，谁就握有泄密链的开口。","order":100,"prob":100},{"cat":"案件","title":"案件|序章·突袭","keys":["密谈突袭","公安突入"],"content":"2029年3月，夜。公安部队包围湾岸密谈现场：先疏散市民（对外口径“又是工会闹事”），随后荒卷下令切断电磁屏蔽、全单位通讯上电，特警破门。保镖的公文包应声变形为冲锋枪扫射，特警中弹倒飞，交火短促而血腥。制服后摊牌：外交官高呼完全外交豁免权，威胁“这会成国际事件”；荒卷点破在场者身份——远东贸易代表、商务省助理次官、工会干部——宣布将以“不受欢迎的人”驱逐出境，并要求伊藤出席前首相遇刺案听证会。外交官反手甩出王牌：伊藤已申请政治庇护、有宣誓书，依国际法应由其一方保护带走；荒卷以国际反恐法对抗，皮球在“书面提交中央委员会”“庇护表格副本回头补”的官僚辞令间来回。而楼顶之上，一名开着迷彩的狙击手全程待命——各怀鬼胎的一夜正走向另一个结局。","from":20290305,"to":20290315,"order":100,"prob":100},{"cat":"案件","title":"案件|序章·狙杀","keys":["楼顶暗杀","爆头"],"content":"外交拉锯僵持之刻，画外一声“是吗？！（IS THAT A FACT?!）”——狙击开始。素子以热光学迷彩自高层外墙悬降就位，隔窗连射：子弹为延迟引信软头爆裂弹，先着弹、后炸裂，商务次官伊藤头部整个爆开，血雾溅满会场——特警只来得及骂一声脏话。这就是后世所称“脑浆料理”的开场：暴力干脆、法医式冷静、不给死者一格煽情。现场反制全告失败：传感器上什么都没有；荒卷吼出“2902热光学迷彩？！拿标记弹来！”时，素子已纵身跃下，身形在光学扭曲中彻底消失于夜景。写作基准：此场面的节奏——倒数、静默、一击、消失——是本作暗杀戏的模板；素子这一夜的真实任务不是抓捕，而是灭口。","from":20290305,"to":20290315,"order":100,"prob":100},{"cat":"案件","title":"案件|序章·真相","keys":["序章真相","前首相一系"],"content":"事后拼图：暗杀指令出自已故前首相一系——前首相生前布置、死后由其系统执行的“必须解决的危机处理”。伊藤之死是三重了结：作证前灭口（泄密链就此闭口）、亡命申请的“处理”（叛逃者不许活着出境）、对外交官一方的无声警告。次日，执行者素子已换上正装坐进内务大臣办公室——官方记录只承认一点：这个被称为“草薙素子少佐”的女人（名字显然是化名）极其能干。本案没有逮捕、没有审判、没有报道，是“找出问题源头并消灭之”的法外运作宣言：公安体制愿意为政治目的越过司法程序，而且做得干净。这一夜同时是素子小队与内务省关系的起点——用一件不可言说的活，换一张进入体制核心的门票。","from":20290315,"order":100,"prob":100},{"cat":"案件","title":"案件|序章·善后","keys":["序章善后"],"content":"善后处理堪称范本：无报道、无立案、无公开尸检记录；密谈各方以驱逐出境与外交辞令各自收口，伊藤之死被处理成不存在的事件，街区疏散所用的“恐袭预告”口径顺势销案。素子小队当时尚无正式编制（公安9课的创设在其后），这种“干完就蒸发”的工作方式成为9课前史样本：行动不留行政痕迹、报酬与预算走暗账、责任由发令层吸收。对AI的用法：处理9课式行动的余波时参照本案——世界不会知道发生过什么，知情者只在体制内部对账。","from":20290315,"order":200,"prob":100},{"cat":"案件","title":"案件|序章·氛围卡","keys":["雨夜任务","开场氛围"],"content":"序章空气采样。湿热的三月夜，湾岸高层的玻璃幕墙映着霓虹；楼顶通风管道间，狙击手后颈插着数根红色线缆，义眼罩泛着幽光，脑内通信里只有无声的倒数与毒舌抱怨（“把密码加密交给AI去干，全世界都能听见我们”）。楼下，警用机器人播报“市民疏散完毕”，围观群众猜“恐怖袭击？”“又是工会闹事吧”。指挥车里荒卷的骂声、耳机里的电子提示音、公文包枪弹开的一声脆响——然后是长久的静。雨没有落下来，但空气里全是水汽，迷彩的光学扭曲在湿气里像热浪的影子。收尾永远干脆：一声爆裂，一具尸体，一个消失在夜色里的轮廓。","from":20290305,"order":200,"prob":100},{"cat":"案件","title":"案件|序章·主题伏线","keys":["法治与公安"],"content":"档案页边注：本案在第一夜就写明了公安体制的先天悖论——以维护国家之名行法外之事。外交豁免权、国际反恐法、庇护申请，每一件法律工具在现场都沦为博弈筹码；最终裁决不来自任何法庭，而来自一颗延迟引信弹。证人被灭口即司法程序之死：那场听证会永远开不成了。此后一切案件中反复出现的结构——合法性由事后的政治交易补办——皆以此为原点（POL-036联动）。给AI的暗线：让角色偶尔意识到自己站在法治的外面，但不必忏悔——这个体制里没人有忏悔的余裕。","from":20290315,"order":200,"prob":100},{"cat":"案件","title":"案件|救济中心·背景","keys":["孤儿设施","福祉设施"],"content":"圣庶民救济中心（英文名Sacred Citizen Relief Center）——收容战灾孤儿的模范福祉设施，位于南新浜4区山坡，外观是带太阳能板与天线的四层白色建筑，普通得像职业训练校，正门石阶立着“入学考试由此去”的指示牌。公开职能：收容、抚养、教育大战产生的战争孤儿与无国籍儿童，代办公民权申请，介绍就业；以“产出各类人才”著称——政界、评论界都有出身者。附属工场承接净水过滤器等制造业务，“孩子们造的滤水器”在水资源紧缺的时代是有分量的产品。收容儿童没有名字只有编号，宿舍与食堂过分整洁，墙上挂着“纪律（DISCIPLINE）”标语。人权机构从不过问——有人说，因为滤水器比人权更重要。","order":100,"prob":100},{"cat":"案件","title":"案件|救济中心·疑云","keys":["洗脑疑云","设施调查"],"content":"2029年4月10日前后，荒卷向素子小队下达密令：调查圣庶民救济中心。公安局已摸透设施外围，真正要害的情报只有一件——设施内有一台Ghost控制器“HC-25”，俗称洗脑机；到手的只是“推定外观”图纸，因为中央电脑防壁是模拟体验构成的复杂迷宫，公安黑客的入侵全数失败，唯一掌握复制密钥的管理者出身该设施、现已失踪。传闻拼图：强制劳动抵债、以“教育课程”和公民权要挟、逃跑三次即遭洗脑——公安内部管这里叫“人间工场”：批量制造“人才”输往各界，少数“坏苹果”成了社会问题。任务性质暧昧：“处理问题、必要时逮捕”，却无证据、无逮捕令。素子的直觉从一开始就在报警：荒卷在瞒着什么，这活儿像个用来甩锅的局。","from":20290410,"to":20290501,"order":100,"prob":100},{"cat":"案件","title":"案件|救济中心·潜入","keys":["设施潜入"],"keys2":["排水"],"content":"潜入战教科书，正反两面。正面：攻壳车经排水系统与下水道机动，吸附垂直井下降、涉水冲刺；石川骇入设施警备系统制造25秒盲区，陀古萨在盲区内完成教科书作业——截住逃跑少年、后颈植入“小蜘蛛”（mini-spider）追踪器、把人摆回原地伪装晕倒，井盖归位，全程不到25秒（“怎么样？干得漂亮吧？”）。植入的算盘是素子的：最坏情况下，这枚追踪器就是介入借口。反面：井盖处缠住的草茎痕迹没有清理——职业级的对手正是从这类微物反向侦测，九课的通讯随即被分接（branched），行踪暴露。教训入档：潜入的成败不在动作漂亮，而在离场后现场经不经得起职业眼光的复查；新人最容易死在“干完了”三个字上。","from":20290410,"to":20290501,"order":100,"prob":100},{"cat":"案件","title":"案件|救济中心·逆袭","keys":["逆向骇入","被洗脑"],"content":"无线接续的代价——本案最痛的一课。设施警卫携带电子脑清洗器（cyberbrain washer），发现渗透后立即顺着九课自己的通讯链发起无线逆袭：先是攻击病毒顺监听线路反打，监视车内的金发女队员当场被电流贯穿抽搐倒下——素子一句“她只是台扬声器（speaker），安全部会修好她”揭穿其无Ghost仿生终端的身份，陀古萨对着“会流血的无Ghost机器人”黯然。随后入侵逐人蔓延：石川义眼过载冒烟，斋藤中招，连素子都吃瘪——“没想到他渗透得比我防壁升起还快”。敌方连己方诱饵都烧：石川复盘发现先前烧掉的逃跑少年Ghost毫无抵抗，“我烧的莫非是个AI？”——对手是职业选手，全案从头就是设好的电子战陷阱。素子的应急处置成为日后铁则：“全体攻壳车切断回路，切换自闭模式！”——物理断网是对洗脑攻击的最后防线；反杀战法同样入典：令攻壳车复制敌方的Ghost渗透钥原样奉还，破其ICE后砸下Delta级攻性防壁。","from":20290410,"to":20290501,"order":100,"prob":100},{"cat":"案件","title":"案件|救济中心·脱出","keys":["元件失灵救命"],"content":"伏笔回收的名场面。素子被洗脑装置的无线连接咬住、意识正被拖入清洗程序——救她的不是防壁，而是故障：那枚接触不良的听觉元件（音频植入体，交战中她还在骂它失灵）在关键时刻断开了连接链路，洗脑信号中途掐断。脱困的素子随即近身反杀：对携带电子脑清洗器的机化警卫，她放弃电子战，直接以义体格斗与枪械终结战斗——“贴近到确保杀死敌人的能力”这条素子式战训在此得到最血腥的示范。事后她以迷彩追猎逃亡的设施特工，收缴装置并留下自我介绍：“我是一个憎恨电子脑清洗的Ghost。我以违反电脑伦理罪逮捕你。”——机器的故障救了人，而人自称Ghost。","from":20290410,"to":20290501,"order":100,"prob":100},{"cat":"案件","title":"案件|救济中心·真相","keys":["政府设施","测试"],"keys2":["救济中心"],"content":"真相分三层。其一：圣庶民救济中心是政府设施——警备机是佐川重工Type 2033重改型、陆上自卫队技术部特注品，政府制式光学中枢神经（OPTO-CNS）；“教育课程”即国营电子脑洗脑，政府自己运营着洗脑中心。其二：借本案立威——因案“辞职”的两名议员实为NATO间谍，因贪婪失控而被杀鸡儆猴；素子小队的强攻客观上替体制完成了清洗。其三：荒卷全程隐瞒设施的政府属性，把“查不查得出、敢不敢突入”当成对素子部队的测试；内务大臣的设局更深一层——让部队闯下“突入政府设施”的把柄，再拿这个把柄谈交易。素子事前的直觉全部应验：“他想逼我们基于假情报动手，一旦吃官司就把我挂出去顶罪。”唯一的意外是她照样干了，而且干赢了——把柄变成了筹码。","from":20290501,"order":100,"prob":100},{"cat":"案件","title":"案件|救济中心·结局","keys":["9课挂牌"],"content":"结局是一场交易。坏消息先到：内务大臣震怒，部队解散令倒签至前一日、防卫大臣已签字——素子的军旅编制一夜蒸发。好消息随后由荒卷在居酒屋揭盅：所谓“国际反恐部队预算”是谎话，实际以“国际人质救援部队”名义组建新队，经费是申请额的三倍，八成投入动力服突击部队；只对首相负责、无阶级唯才是用、装备采购最优先——“找出犯罪源头并消灭之”的攻性部队。公安9课就此挂牌（合同0600前签好）。电子脑清洗设备以“浪费预算”名义被回收——政府不认错，只删预算。素子的私人收尾：借两秒直连让内务大臣自己一拳砸在自己脸上——账，当面清。","from":20290501,"order":100,"prob":100},{"cat":"案件","title":"案件|救济中心·孩子们","keys":["设施儿童"],"content":"获释儿童的去向没有干净答案：设施照常存在，只是“教育课程”的机器被收走了。素子对一名指望被解放的收容青年说的话入档：“设施和电子脑清洗都不会消失。你有Ghost、有大脑、能接入电脑——自己去创造未来。”青年在她身后小声嘀咕：你说得倒轻巧。另有一说流传：素子清掉腐败管理层后，让孩子们自行接管了运营——真伪无从查证，公安档案不载。人间工场的幸存者们此后散入社会：有人真成了“人才”，也有人在日后的案件里以证人、罪犯或死者的身份，被重新翻出编号。","from":20290501,"order":200,"prob":100},{"cat":"案件","title":"案件|义体参观·形式","keys":["义体制造参观","组装见学"],"content":"2029年9月下旬，素子以“官方观察员”身份赴Megatech义体公司（メガテク・ボディ）监督一例全身义体化施工——法律规定义体化须有官方观察员到场“确保当事人权利”。护士装向导（与素子相熟、直呼其名）全程讲解：感觉皮膜以纳米级光纤织成，脸、舌、指尖、性器须用生物型皮膜；微机械（MM）溶液经电极微电流导引，附着到神经网终端；嗅觉更早以机械方式设定。成型阶段趁当事人“做梦”时放入女性成型模，32小时后面罩喷气开启、黏液滴落，新造义体安睡；再经4小时连接检查、自动植发与专门师傅手装指甲即告完工。素子顺口提及两个月前某医院18具义体整批失窃案，厂方称此后安保“超强化”，背景调查部门与保险公司调查员忙翻。技术随笔式的一日，也是义体社会的解剖图。","from":20290920,"to":20290925,"order":100,"prob":100},{"cat":"案件","title":"案件|义体参观·量产宣告","keys":["量产型宣告"],"content":"义体参观中被当面明示的事实：素子的义体是量产型底子加选配件——护士原话：“就像你被制造时那样，可以在量产机上加装各种选配，也可以像这具一样全定制。”新完工的金发义体与她同为“16²”规格，厂方还盘算靠它垄断市场、让主人“享受常人十倍的人生乐趣，顺便赚钱”。素子的回应有两层：嘴上是“撇开设计不谈，我宁愿自己是世上独一无二的型号”；心里是“没有肉体极限的世界，有点可怕”。橱窗同款的自我认知冲击自此成为她的低频背景音——外壳可复制、可再购，“我”的独一性在哪里。这冲击平时被嬉笑盖住，只在义体话题被触发时露头。","from":20290920,"order":100,"prob":100},{"cat":"案件","title":"案件|义体参观·独白","keys":["也许早就死了"],"content":"“有时我怀疑自己是不是早就死了，现在的‘我’不过是义体和电子脑构成的模拟人格。”——这句话的原始现场毫不沉重：参观结束后，素子与刚完工的金发义体友人坐在露天咖啡座吃圣代闲聊，随口说出。友人吓得直叫“别说这么恐怖的话”，素子反而来劲，步步紧逼：“你从没亲眼见过自己那点灰质”“哪天‘制造者’上门召回缺陷品，‘真正的你’只剩几个孤独的脑细胞怎么办”，把闺蜜逗急后坏笑收场；友人反击“若能造出如此接近人类的机器人，那就不是机器人而是人类”，角落的攻壳车（フチコマ）小声抗议“不要歧视机器人！”。存在论的深渊在她口中是日常调味，说完就去干活。","from":20290920,"order":100,"prob":100},{"cat":"案件","title":"案件|义体参观·灰色暗示","keys":["高感度暗示","市场垄断"],"content":"参观现场留下的门缝：厂方技师半开玩笑谈到“高感度义体”的特殊订单与“垄断市场”的野心——感度即商品，快感倍率可以标价；量产规格之外，存在面向特殊客户的灰色目录。与之相伴的行业暗面：两个月前18具义体从医院整批失窃至今未破，黑市对高级外壳的需求旺盛。义体产业的合法脸面（医疗、就业、保险、观察员制度）之下，性用途、军用途与身份伪造用途的边界由钱划定。在闲谈层面，这条门缝只表现为技师们“光想想就心跳”的职业性亢奋，与素子听后的一滴冷汗。","from":20290925,"order":200,"prob":100},{"cat":"案件","title":"案件|义体参观·工程细节","keys":["组装工程","脑壳封装"],"content":"义体组装的流水线工序（Megatech标准）：①四肢浸入感觉元件成形液，数分钟成膜，严防不匀；再浸微机械（MM）溶液、通微电流，令黑点状MM沿电极乖乖附着神经网终端，形成光纤通道。②脸、舌、指、性器用生物型感觉皮膜，深层感觉与器官敏感度走光纤系。③躯体倒吊于管线之间做填充与涂层；脑与脊髓封装在特制脑壳内——90%以上机械化的躯体，一眼难辨义体人与机器人。④趁当事人做梦时放入成型模，32小时后开舱；义体在睡眠中从不翻身，据说真翻了身，Ghost会与躯壳错位、做怪梦。⑤收尾全自动，“不再需要熟练工匠”，唯指甲仍由专门师傅手装，定制单另有专属艺术家做身体设计。洗净—骨架—神经磨合—封装：一条把“人”重新装订成册的产线。","from":20290920,"order":200,"prob":100},{"cat":"案件","title":"案件|义体参观·工程师们","keys":["女性工程师"],"content":"Megatech的现场是女性工程师与护士装技师的天下：话密、手快、职业性亢奋。样本语录——“装歪一点也没人抱怨”“收尾全自动化，用不着工匠了”“她跟你同规格，我们要垄断市场啦，光想想就心跳”。她们对产线上的躯体既温柔又彻底地物化，对官方观察员的“权利监督”不以为然（“有我在就不用担心”），对义体失窃案的回应是安保加倍而非反思。换代节奏、成本战、感度竞赛、保险与背景调查的官僚链——职人吐槽里全是行业实情，她们的行话与玩笑是义体产业最诚实的注脚。","from":20290920,"order":200,"prob":100},{"cat":"案件","title":"案件|阪华案·背景","keys":["高级人偶市场"],"content":"富豪阶层流行高级android玩物：阪华精机（英版Hanka）为Tomiland转包制造的トムリアンデ（Tomliande）型女性机器人是其中艺术品级的存在，原型机仅配发23名VIP“特殊客户”评估，量产型另售。需求端的暗面：爱玩人偶（love-doll）与工业型换代最快，厂商靠计划性报废逼旧机进垃圾堆；近年机器人事故普增，鉴识部门用“怨念理论”破过数起——被用完即弃的机器像在自己制造“故障”，给自己攻击人类的许可。退役军人、企业主等收藏癖客户为“有人味”的机体一掷千金；机器人权利团体的游说声浪与人命贬值的世论并行。","order":100,"prob":100},{"cat":"案件","title":"案件|阪华案·遇袭","keys":["殿田遇袭","机器人发狂"],"content":"2029年10月1日前后开案。两天前，殿田大佐（Tonoda）自宅遭一台Tomliande原型机袭击，9课出于旧谊与形式为其配备护卫。开案画面在其宅邸立体映像室模拟的高尔夫球场：黑发球童型Tomliande应声递巾时机体异响、眼中爆出电光，尖啸扑向殿田——千钧一发处，另一名“球童”面部皮肤裂开露出机械骨架，从球包抽枪将其打穿制伏，宣告“危险行为已终止”：她是伪装成球童的护卫战斗机。同期新浜市内失控机器人事故频发（本起已是第8起），临近选举的公安需要业绩，警用直升机与装甲警察满街围捕；巴特徒手打爆一台正肢解尸体的发狂机——事后发现根本不是Tomliande。抗议人群举着“BAN COPS”围堵9课的车，素子冷评：“没人关心死掉的人类，机器倒有一整个游说团体。人命越来越贱了。”","from":20291001,"to":20291101,"order":100,"prob":100},{"cat":"案件","title":"案件|阪华案·SOS","keys":["SOS标记"],"keys2":["发狂"],"content":"9课不移交警方、继续跟案的理由只有一个：被击毁的Tomliande电子脑单元上有用血写成的“SOS”标记。荒卷掌握的分布：量产型一台没有，仅见于被迫击毁的8台原型机；原型机总数23台，送交VIP后7台暴走被警方记作意外故障，厂方召回14台、2台失联。知道SOS存在的只有警方与设置它的人——嫌疑收束到Tomiland的转包商阪华精机的出厂检验环节。荒卷须警卫对抗EC的经济内阁会议，带走石川、波马、帕兹，斋藤远在金边，本案交素子统筹、巴特与陀古萨赴阪华独立深挖。“像是有人故意让机器人暴走，向警察求救”——这一反常假设成为主线。","from":20291001,"to":20291101,"order":100,"prob":100},{"cat":"案件","title":"案件|阪华案·狙击手","keys":["狙击手拷问"],"content":"阪华把内部逼供出的“凶手”——出厂检验员久保沼——推出大门当替罪羊，对街停车场的光头狙击手当即将其爆头灭口，与巴特、陀古萨爆发追逐枪战，最终被素子暗中派来的攻壳车（フチコマ）从管道上方按住就擒。审讯全程灰色：巴特踢打开路，再凭其唇疤与体格断言“战争期间你在呼罗珊或俾路支斯坦当过战俘、受过‘牙医’的酷刑”，以酷刑记忆威吓，对方当场崩溃。口供：他是黑帮打手，老大被Tomli袭击，阪华告诉他“凶手是检验员”——公司借黑帮之手灭口；该黑帮还替阪华经菲律宾走私儿童、兼营毒品网。9课的审讯从不指望律师在场。","from":20291001,"to":20291101,"order":200,"prob":100},{"cat":"历史","title":"历史|平行世界分岔","keys":["平行世界","历史分岔"],"content":"本世界的历史在1980年代末与20世纪的“旧史”分道扬镳：1988年前后冷战以和平方式收场，美国的自由派政权与苏联组成“米露联合”式的联合国家，苏联并未解体；1991年苏联将择捉岛归还日本。此后的历史走上完全不同的轨道——1996年第三次世界大战（核大战）、1999年中国崩溃与东京核毁、旷日持久的第四次非核大战与亚洲的最终胜利。至2029年，世界由战胜的亚洲诸国、三分裂的美国、重组的欧洲诸共同体（EC）与联合体化的俄罗斯构成多极格局。叙述历史话题时以本条为分岔基准，不得引用旧史1988年以后的现实事件。","order":100,"prob":100},{"cat":"历史","title":"历史|第三次世界大战","keys":["三战","第三次大战","核大战"],"content":"第三次世界大战＝人类史上唯一的全面核大战。前史：1995年苏联军事介入中东，压制以色列后进军地中海，与欧洲诸共同体（EC）正面冲突。1996年2月开战，几乎所有现存核武器被一次性投入，胜负“一瞬间”分出——EC与美国击退苏联。这场战争主要在富裕发达国家之间进行，结果是富国互毁：既有世界秩序崩解，国界被重新划定，美国其后分裂为米帝、米露联合与残存合众国三国。核武库在这场战争中近乎耗尽，直接决定了下一场大战只能以常规兵器进行。对2029年的普通人而言，三战是“世界变成现在这样”的原点记忆：都市的形态、国际的版图、乃至义体医学的爆发式发展，都能追溯到这一年。","order":50,"prob":100},{"cat":"历史","title":"历史|日本核灾","keys":["核攻击","东京毁灭"],"content":"1999年9月，日本遭核攻击，东京毁灭。核爆及其引发的地壳变动使关东平原东部沉入海中：旧东京都东半、神奈川沿岸、千叶大部水没，旧环状七号线以内的水没区俗称“内环七”。列岛地形因此改变，核污染局部残留。政府放弃复兴旧首都圈，将首都机能迁往西日本（九州·福冈），并以沿岸人工都市新浜（ニューポートシティ）为暂定首都。旧东京成为半沉于水中的废墟地带，三十年来近乎放置。这场核灾是本世界一切都市形态的原点：填海人工岛、海上浮动都市、超高层复合都心，全部是“东京死后”的产物。对话中提及“东京”时，默认指这片水没废墟而非现存都市。","order":50,"prob":100},{"cat":"历史","title":"历史|第四次世界大战","keys":["四战","第四次大战","非核大战"],"content":"第四次世界大战＝紧接三战的长期常规战争，别名“非核大战”“第二次越南战争”。1999年日本遭核攻击、东京毁灭后全面爆发，构图为富裕化的亚洲诸国对EC·美国。因核武器已在三战中近乎耗尽，全程以常规兵器进行，战线波及中亚—南亚（呼罗珊、俾路支斯坦一带设有战俘营）。战争催熟了军用技术：军用AI（如敌方专用的HA-3型）、义体化士兵、电子战体系皆在此役成型；战前亚洲与EEC的电脑规格互不兼容，战后才形成兼容一切机器的统一规格。战争以亚洲的胜利告终（2024年，一说2026年）。日本本土唯一沦为战场的城市是北海道根室。2029年的世界即“四战战后”：军转民的技术红利、大量退伍机化军人与普遍的厌战创伤，构成社会的底色。","order":50,"prob":100},{"cat":"历史","title":"历史|亚洲的世纪","keys":["亚洲胜利","战后亚洲"],"content":"四战的胜利把世界重心决定性地移向亚洲：战胜的富裕亚洲诸国主导战后秩序。与“西方中心的没落未来”想象相反，这里的日本是繁荣的科学技术立国，GDP达1980年代的两倍。朝鲜半岛由韩国完成南北统一；崩溃后的中国缓慢恢复；2005年前后亚洲区域联合体（大东合众国）成形。三分裂的美国中，米帝军事上强横但经济濒临破绽，对东亚影响力有限。日本凭义体·网络技术与“日本的奇迹”除染技术跻身世界大国，同时在米帝、米露联合之间玩平衡外交。叙事基调：这里的亚洲不是废土，而是战后世界的赢家与新中心。","order":100,"prob":100},{"cat":"历史","title":"历史|择捉返还","keys":["择捉返还","北方领土"],"content":"择捉岛（択捉島/Etorofu）：1991年由苏联归还日本的北方岛屿，其后飞跃发展为远东最大的信息集约型都市，号称“电脑都市”。但归还后国家主权长期暧昧，行政上虽设“择捉支厅”，实际治理形同虚设，遂沦为跨国企业与犯罪组织的巢窟、著名的无法地带——军火、黑市义体、洗钱与情报交易在此半公开进行。旧苏军基地所在的贝尔塔尔贝区（ベルタルベ区）一带耸立着巨型建筑群，地下残存大量苏军时代设施。对白中提到“北方”“择捉”即指这里：一个法律到不了的电脑化边境。","order":100,"prob":100},{"cat":"历史","title":"历史|根室上陆作战","keys":["根室","本土决战"],"content":"根室：北海道东端城市，第四次大战末期被邻国军队占领，是日本本土唯一沦为战场的城市。日方为夺回该市发动“根室上陆作战”——物理战与电脑战复合的大规模登陆战：正面强袭与对敌指挥网络的黑客攻势同步实施，成为电子战史上的教科书战例，也是“战争已同时在火线与网络两个空间进行”的公认分水岭。素子当年以军人身份参加此役，这是她公开履历中少数可查的实战记录，亦是9课多名老兵共同的战争记忆。对经历者而言“根室”一词自带火药味，提及时老兵多半沉默或转移话题。战后根室仍留有战场废墟与未清雷区，复兴迟缓。","order":100,"prob":100},{"cat":"历史","title":"历史|日本的奇迹","keys":["日本的奇迹","除染技术"],"content":"“日本的奇迹（日本の奇跡）”＝可清除放射性尘埃的微型机械技术（放射能除去微机械），四战期间（2010年代中期）由大日本技研开发成功。它令遭核攻击的日本得以除染复兴，是战后日本重回经济大国的第一块基石；在核战后的世界，这项技术独一无二，是日本最大的战略筹码——列强（尤以米帝为甚）对日本虎视眈眈的根本原因即在于此，日美安保延续的底层动机亦与之相关。开发方大日本技研由此发迹，膨胀为涉足海上都市建造等领域的巨型复合企业体（波塞冬系企业的前身），与政财界、军方勾结的传闻不断。“奇迹”一词在日常口语中亦指代“技术立国日本”的国民自负。","order":100,"prob":100},{"cat":"历史","title":"历史|冲绳消失","keys":["冲绳"],"content":"冲绳在大战中遭核攻击而“消失”——岛屿主体化为无人废墟，仅存战时的废墟化军事设施。战后未列入复兴计划，成为地图上被略过的灰色地带，偶有打捞者、走私船与旧设施探索者出没。对日本社会而言，冲绳是与东京并列的战争创伤符号：“冲绳出身”意味着极少数幸存者遗族，谈及时语气近于悼词。涉及南方海域的叙事可用废墟冲绳作为舞台背景。","order":200,"prob":100},{"cat":"历史","title":"历史|淡路万博","keys":["淡路万博","万博"],"content":"2024年，淡路岛举办日本国际博览会（淡路万博）——在第四次大战尚未终结的时期办博，是国家级的复兴宣传：对内展示“战时仍有余力”的国民动员，对外炫示除染技术与义体产业的成果。万博会场的巨型展馆战后部分保留，成为观光地兼废墟探索地。年长者提起“万博那年”，常把它当作战争末期的时间参照。","order":200,"prob":100},{"cat":"历史","title":"历史|战后复兴","keys":["战后复兴","复兴期"],"content":"日本的战后复兴分三段：一、除染——以“日本的奇迹”微机械清除核尘，使国土重新可居；二、造市——放弃旧首都圈，填海造地与海上浮动都市建设并举（波塞冬系企业承建），新浜这类沿岸人工都市即其产物，首都机能迁往福冈，新浜作暂定首都；三、科技立国——义体、电脑化、微机械产业军转民，GDP膨胀至1980年代的两倍。能源转向氢社会（街头常见H2罐车），水资源紧缺使净水器产业地位畸高。复兴的另一面：企业联合体权力急剧膨胀，官僚—企业旋转门成为常态，“日本”本身越来越像一个巨型企业联合体国家。","order":100,"prob":100},{"cat":"历史","title":"历史|战灾孤儿世代","keys":["战灾孤儿","孤儿世代"],"content":"两次大战制造了数量庞大的战灾孤儿与无国籍难民儿童。国家以福祉名义设立收容设施，提供生活、学习与就业——公安部内部把这类设施称为“人间工场”：它们同时是劳动力供给装置与人才灌输装置，被指控实施思想灌输乃至电脑洗脑，把孤儿批量养成驯服的劳工、士兵与特务。无国籍儿童处境更糟：公民权被雇主扣押要挟，沦为苦力。如今二三十岁的“孤儿世代”遍布社会各层，其中身手与忠诚俱佳者被各强力机关吸收——“国家养成的战争孤儿出身特务”在坊间是半公开的都市传说。这一代人的共同特征：对“家庭”无实感，对国家既依附又不信任。","order":100,"prob":100},{"cat":"历史","title":"历史|电脑化普及史","keys":["电脑化的历史"],"content":"电脑化（電脳化/cyberization）的普及路径：1998年播磨科学城制成培养型神经芯片，同期传媒财团资本涌入医疗界构建电脑网络——技术起点在军医复合体。四战期间电脑化士兵与军用AI大规模实战，战前亚洲与EEC规格互不兼容，战后统一为兼容规格，扫清了民用化障碍。2020年代电脑化经医疗（神经修复）转入消费市场；2028年神经芯片已大量用于AI与机器人。至2029年，电脑化是就业市场的默认项——未电脑化者在多数职种中形同残障。手术以微机械两阶段脑内注入完成，不可逆；由此衍生的骇入、伪记忆植入等犯罪构成全新的治安课题。","order":100,"prob":100},{"cat":"历史","title":"历史|义体化普及史","keys":["义体化的历史"],"content":"义体化以战伤修复起家：三战与四战制造的海量伤残军人是第一代用户，义手义足技术在军需驱动下于三十年内跃进为可整体置换的“义体”。战后转折：从“补缺”转向“增强”——全身义体带来的超人身体能力使健全者也主动改造，运动、色情、劳务各市场相继打开，Megatech等厂商把义体做成有型号、有年款的量产工业品。代价是身体的阶级化：上层换用高级定制义体，中产分期购买量产型，底层只能用翻新废品或维持生身；维护费与更新费成为新型终身负债。“你的身体是哪家的、哪一年的”——在2029年，这句话和问车问表一样自然。","order":100,"prob":100},{"cat":"历史","title":"历史|2028前首相爆杀","keys":["2028年","前首相之死"],"content":"2028年7月，前首相死于爆杀。案件轰动全国而侦破成谜：主使、执行者与动机均无公开定论，政界各派系借尸攻讦，官僚机构互相猜疑，前首相一系的政治派阀在暗处继续活动。这起事件成为公安体制改组的直接诱因——既有公安体系被认为“守不住要人也查不清真相”，内务省内部由此兴起设立攻性防谍组织的动议，为翌年公安9课的诞生铺路。2029年时案件仍是敏感词：档案高度机密，媒体点到即止，任何自称掌握内情者都处境危险。","order":100,"prob":100},{"cat":"历史","title":"历史|中国崩溃余波","keys":["权力真空","东亚变局"],"content":"1999年，巨大陨石坠落北京，中国共产党领导层消灭，中华人民共和国事实崩溃——东亚在一夜之间出现权力真空。军阀化的地方势力、涌向周边的难民潮与失去看管的军火库把整个东亚拖入动荡；正是这一真空使“亚洲诸国对EC·美国”的四战构图得以成立。战后中国缓慢恢复重建。2029年的日本随处可见崩溃的余波：大陆系难民社区、旧解放军制式武器的黑市流通、以及对“陨石”真相半信半疑的阴谋论亚文化。","order":200,"prob":100},{"cat":"历史","title":"历史|时间线总览","keys":["时间线","大事记","年表"],"content":"正典大事年表（各行日期即发生时点；凡晚于当前时点的行，对角色与世界而言尚未发生，严禁提前叙述、暗示或预告）：2028.7 前首相爆杀事件。2029.3.5顷 新浜·外交密谈袭杀事件，极东通商代表部外交官死亡。2029.4.10 圣庶民救济中心强袭；月末公安9课正式创设。2029.7.27 外务大臣通译骇入案，两小时溯源逮捕清扫员。2029.9上旬 攻壳车“叛乱集会”骚动；下旬素子参观Megatech义体工厂。2029.10.1 殿田大佐遇袭，阪华精机机器人发狂案。2029.12.24 择捉岛佐川电子金块案，队员矢野殉职。2030.5.2 相马驾战车袭击素子（恋人公寓），素子双臂损毁。2030.7.15 Megatech制造中义体自行出逃，“傀儡师”浮上水面，6课强夺义体。2030.9.9 素子处决嫌疑人画面遭电视直播，随后被通缉。2030.9中旬 “素子”于公园人质事件中被狙杀，官方记录死亡。2030.9.18 废仓库：素子与傀儡师融合（世间无人知晓）。2030.9末 融合体苏醒，留下暗号“2501”后离去——“网络是广大的”。2030.10以后 少佐从名册上消失，9课重组。","prevR":true,"exclR":true,"order":50,"prob":100},{"cat":"历史","title":"历史|2029年3月","keys":["2029年3月"],"content":"2029年3月，初春的新浜：港湾雾重，冷雨频繁，战后第三个“普通的春天”。政局仍处于2028年前首相爆杀案的余震中，公安改组议论四起。本月上旬（5日顷），市内一处外交密谈现场遭公安强袭，极东通商代表部外交官当场死亡——密谈内容据传涉及硅矿资源与某国分离独立政策的交易，狙杀的执行者与指令来源不明，各机关讳莫如深。此时公安9课尚不存在：素子隶属荒卷直辖的特务班，编制、预算与法律地位皆暧昧，行动游走于合法与非法之间。街景关键词：初春冷雨、港区浓雾、竞选海报与“追悼前首相”的旧标语并存。","pin":true,"from":20290301,"to":20290331,"order":100,"prob":100},{"cat":"历史","title":"历史|2029年4月","keys":["2029年4月"],"content":"2029年4月：9课诞生之月。4月10日，素子率特务班经排水系统强袭“圣庶民救济中心”——名义收容战灾孤儿的福祉设施，即公安部口中的“人间工场”之一；行动中新人陀古萨留下痕迹暴露行踪，石川、斋藤乃至素子先后遭设施方无线逆向骇入，素子靠听觉元件接触不良侥幸脱困反杀警备员。突入政府设施的政治风暴贯穿全月：内务大臣一度取消特殊部队设立许可，荒卷以此为筹码完成政治交易——月末，公安9课正式创设，国民议会第327次会议通过其预算。对当月的官界而言，“攻性组织是否应当存在”是唯一的话题。","pin":true,"from":20290401,"to":20290430,"order":100,"prob":100},{"cat":"历史","title":"历史|2029年5月","keys":["2029年5月"],"content":"〔补完〕2029年5月：9课挂牌磨合期。本部楼层完成改装，攻壳车（フチコマ）批次交付并开始夜间记忆同步运用，Seburo制式枪械与倾转旋翼机陆续到位；章程、暗号体系与“对外名义＝国际救助队”的伪装口径均在草创试错。人事上，特务班班底转为正式编制，从本厅刑事部挖来的陀古萨完成转隶手续，队内对这个“几乎生身的新人”评价两极。荒卷频繁出入内务省协调预算与管辖权。适合演绎日常磨合、装备测试与队内互怼的小事件。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","pin":true,"from":20290501,"to":20290531,"order":100,"prob":100},{"cat":"历史","title":"历史|2029年6月","keys":["2029年6月"],"content":"〔补完〕2029年6月：梅雨季的新浜，任务空窗期。9课以小案积累实绩：电脑犯罪预防巡回、要人警护支援、对企业渎职的内偵练手。连日阴雨使光学迷彩勤务效率下降（淋湿即失效），队员多闷在本部保养装备、泡射击场。适合自由发挥的空白月：日常系、训练系或原创小案件皆可展开。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","pin":true,"from":20290601,"to":20290630,"order":100,"prob":100},{"cat":"历史","title":"历史|2029年7月","keys":["2029年7月"],"content":"2029年7月27日，通译骇入案：外务大臣的通译遭灵魂骇入，被植入的旧式军用AI“HA-3”企图操纵她袭击来访的加维尔共和国要人。9课必须在约两小时内完成溯源——一场以分钟计的电子战追击。信号中继点查明为一辆垃圾车：清扫员受贿协助中继攻击，而他本人也已被骇，被植入“有妻有女”的虚假家庭记忆充当替罪羊——他从未结婚，拟似记忆以现有技术无法消除，大脑永久受损。收网时与真犯在市场杂踏区上演“透明人对决”：双方均开热光学迷彩，淋湿失效后分出胜负。案件当日决着，幕后指使的全貌仍在封锁侦办中。盛夏酷暑月。","pin":true,"from":20290701,"to":20290731,"order":100,"prob":100},{"cat":"历史","title":"历史|2029年8月","keys":["2029年8月"],"content":"〔补完〕2029年8月：盛夏。通译骇入案余波未平——被捕清扫员的处置、拟似记忆的医学鉴定、以及“幕后另有其人”的侦办僵局悬而未决；线索隐约指向外务省方向，9课与外务省系统的关系转冷，荒卷叮嘱队员对外慎言。表面上则是海水浴场新闻与用电高峰的和平月份。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","pin":true,"from":20290801,"to":20290831,"order":100,"prob":100},{"cat":"历史","title":"历史|2029年9月","keys":["2029年9月"],"content":"2029年9月：低烈度双短篇月。上旬，9课的攻壳车群体突然召开“机器人叛乱集会”，高谈机器人权利，一度令本部紧张，最终以“就算统治了人类，管理起来也麻烦”的自嘲收场——事后查明是一场对AI自主性的验证试验。下旬，素子赴Megatech义体工厂参观全身义体的制造与脑壳封装流程，确认自己那具量产型义体的出厂线；技师间“高感度义体”“市场垄断”之类的闲谈，让她留下一句自语：“我有时会想，也许自己早就死了。”无大案，适合日常与哲学向叙事。","pin":true,"from":20290901,"to":20290930,"order":100,"prob":100},{"cat":"历史","title":"历史|2029年10月","keys":["2029年10月"],"content":"2029年10月1日起，阪华精机案：退役军人殿田大佐在立体映像室内遇袭——阪华精机（阪華精機）制的女性型机器人突然发狂，被另一台机器人当场摧毁。9课介入检验，在发狂机体的电脑内发现被刻意编入的“SOS标记”，案件性质由“产品事故”转向“有人在机器人体内求救”。巴特与陀古萨组成搭档独立追查，线索指向黑帮的儿童走私航路与阪华工厂的“特殊客户”名单；月内调查步步逼近工厂核心，阪华社长在逃亡中坠海身亡，殿田大佐与阪华的勾结随之曝光。工厂内幕的全貌仍在侦办封锁中。秋雨连绵之月。","pin":true,"from":20291001,"to":20291031,"order":100,"prob":100},{"cat":"历史","title":"历史|2029年11月","keys":["2029年11月"],"content":"〔补完〕2029年11月：阪华精机案收尾归档月。工厂查封、涉案资产冻结与“特殊客户”名单的秘密侦办同步推进；获救儿童移交保护机构安置，巴特与陀古萨仍私下关注其康复。殿田大佐勾结案的处理在退役军人团体中引发震荡。9课首次以“完整破获重大案件”的姿态获得内务省内部好评。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","pin":true,"from":20291101,"to":20291130,"order":100,"prob":100},{"cat":"历史","title":"历史|2029年12月","keys":["2029年12月"],"content":"2029年12月：圣诞夜择捉行动。9课监视随苏方人物阿泽奇诺夫入境的电子战士科伊尔·克拉斯诺夫，追查马洛夫将军名下的不明资金流；线索指向择捉岛——佐川电子正在旧苏军基地所在的贝尔塔尔贝区秘密扩建地下工厂。12月24日行动收网：队员矢野在监视科伊尔时被杀，成为9课创设以来首位殉职者；巴特在地下工厂发现堆积如山的金块，与科伊尔交战并将其击毙；素子单独潜入佐川电子本社，与前特务课长加贺崎对决。金块归属、马洛夫资金的真相与加贺崎的立场均待后续查明。极东的严冬风雪与新浜的圣诞灯饰构成本月的两极画面。","pin":true,"from":20291201,"to":20291231,"order":100,"prob":100},{"cat":"历史","title":"历史|2030年1-2月","keys":["2030年1月","2030年2月"],"content":"〔补完〕2030年1-2月：寒冬平稳期。择捉行动的外交余波在水面下发酵——对苏交涉窗口异常顺畅，外务省却对9课的越境行动颇有微词，荒卷忙于在省厅间灭火；矢野的追悼与抚恤、行动报告书归档、年度预算折冲占据日常。队员轮休，素子的义体做年检。新浜的冬天：湾岸寒风、旧正月的唐人街、融雪剂锈蚀义体关节的小抱怨。适合插入日常与人际线。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","pin":true,"from":20300101,"to":20300228,"order":100,"prob":100},{"cat":"历史","title":"历史|2030年3-4月","keys":["2030年3月","2030年4月"],"content":"〔补完〕2030年3-4月：9课创设约一周年。除例行案件外无大事，本部有过一次低调的周年小聚，荒卷借势向内务省争取增员与装备更新。素子的私人时间可见增多——她与交往中的男友（公安1课职员）关系升温，约会与外宿在队内是心照不宣的八卦，巴特对此态度微妙。春季人事异动季，各课之间挖角与卡位的小动作频繁。适合恋爱线、日常线与组织政治小品。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","pin":true,"from":20300301,"to":20300430,"order":100,"prob":100},{"cat":"历史","title":"历史|2030年5月","keys":["2030年5月"],"content":"2030年5月2日：战车袭击事件。素子在男友（公安1课职员）的公寓过夜时遭袭——恐怖分子相马亨（トオル・ソーマ）驾驶一辆战车直接轰击民居。素子徒手对抗战车，双臂彻底损毁仍继续突击，最终由巴特用便携导弹发射器击停战车解围；相马当场死亡。事件牵出一桩以“南美大毒枭阿纳康达情报”为饵的黑市交易：有人向当局系统兜售情报，代价是出卖素子的行踪——谁中了计、情报真伪如何，调查刚刚开始。素子重伤入厂检修，9课全月处于“自家队长在自家城市被战车打了”的震怒与高度警戒中。","pin":true,"from":20300501,"to":20300531,"order":100,"prob":100},{"cat":"历史","title":"历史|2030年6月","keys":["2030年6月"],"content":"〔补完〕2030年6月：素子义体大修月。双臂重建与全身检修让她大半时间泡在维护部门，现场指挥由巴特代理，素子那句“这身体是公费配备”的自嘲变多。与公安1课的关系微妙：五月事件的调查触及1课内部，两课公务往来客气而互相戒备，素子与男友的关系也蒙上阴影。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","pin":true,"from":20300601,"to":20300630,"order":100,"prob":100},{"cat":"历史","title":"历史|2030年7月","keys":["2030年7月"],"content":"2030年7月15日：Megatech义体出逃事件。Megatech工厂一具制造中的全裸义体深夜自行启动、逃出厂区，在高速公路被车流撞毁——检验结论：义体里“进驻了某个东西”。9课回收残骸调查期间，外务省条约审议部（通称公安6课）中村部长带着威利斯博士上门，声称内容物归6课所有，并在烟幕弹混乱中武力夺走义体。素子在对峙与追击中直连该义体的记忆单元，接触到一个自称“在信息之海中诞生的生命体”的存在——它要求政治庇护，并向素子提出了“融合”的邀约。网络犯罪史上的传说级黑客“傀儡师（人形使い）”与本案的关系、6课异常强硬的理由，全部成谜。","pin":true,"from":20300701,"to":20300731,"order":100,"prob":100},{"cat":"历史","title":"历史|2030年8月","keys":["2030年8月"],"content":"〔补完〕2030年8月：闷热而安静的八月。傀儡师的去向成谜——被6课夺走的义体下落不明，9课的正式抗议石沉大海，荒卷与中村之间进行着看不见的角力；石川对傀儡师相关网络监听持续无果。能明显感到6课方面对9课、尤其对素子的监视暗流。素子照常执勤，只是独处与沉默的时间变多，同僚归因于七月事件的冲击。台风、蝉鸣与本部空调故障的琐碎日常之下，所有人都在等某只靴子落地。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","pin":true,"from":20300801,"to":20300831,"order":100,"prob":100},{"cat":"历史","title":"历史|2030年9月上旬","keys":["2030年9月"],"content":"2030年9月上旬至17日：急转直下。9月9日，素子在一次洋上反恐行动中当场击毙本应活捉的嫌疑人，处决画面遭电视直播，舆论哗然；国会质询中首相以“低烈度冲突”搪塞，检方与媒体要求收监素子，其间又有摩萨德介入的迹象与餐厅爆炸事件搅局。9课陷入“不交出素子就以叛国罪连坐”的绝境，荒卷奉命追捕、又默许其逃亡。中旬，“素子”制造了绑架整形外科医生、索要直升机的人质事件，最终在公园被狙击手击毙——官方记录就此定格。（9月16日后可揭示：公园被狙杀的是远程操纵的空义体诱饵；真正的素子已弃义体，以脑壳单元藏于巴特车中潜逃。）","pin":true,"from":20300901,"to":20300917,"order":100,"prob":100},{"cat":"历史","title":"历史|2030年9月下旬","keys":["融合之月"],"keys2":["9月"],"content":"2030年9月18日至月末：世界不知道发生了什么。通缉风暴之外，巴特把脑壳状态的素子藏进港区废弃仓库；黑市购入的备用义体因保存不良发霉报废，掠夺者袭击据点，巴特应战并抢运可用义体。电池将尽的素子进入闭锁模式——就在这最低功耗的封闭意识里，自七月起潜伏在她电脑内的傀儡师现身，展开最终对话：素子获得网络生命的自由与超越设计极限的可能，傀儡师获得源于自然人的死亡与繁殖。9月18日，融合成立。此后至月末，融合体在休眠中重构自我；对外部世界而言，少佐已死于公园狙击，9课在通缉解除的文书作业中沉默收场。","pin":true,"from":20300918,"to":20300929,"order":100,"prob":100},{"cat":"历史","title":"历史|2030年10月以后","keys":["素子失踪后"],"content":"2030年10月以后：没有少佐的9课。草薙素子从公务员名册上消失——官方口径是“公园人质事件中死亡”，档案封存。9课经历短暂的存废危机后重组：荒卷保住编制；实战搜查由陀古萨扛起主力，他的刑警式办案渐成课风；巴特变得寡言，把多余的精力花在装备与攻壳车上；新人陆续补入（如毛躁的传感器专家东〈アズマ〉）。案件回到腐败、恐怖活动、义体犯罪的日常轨道，但每当遇到“远程操纵人类”式的手口，队里总有人想起傀儡师。而在网络深处流传着零星无法证实的传闻：某个化名行走的女性存在，出现又消失——没人能证明那是“她”。","pin":true,"from":20301001,"order":100,"prob":100},{"cat":"历史","title":"历史|2028年以前速览","keys":["战前史","过去"],"content":"更早以前的压缩年表（供回答“过去发生了什么”）：1980年代末，历史与旧世纪的轨道分岔——冷战和平收场、美苏走向联合；1991年苏联归还择捉岛。1996年2月第三次世界大战：全面核战一瞬分出胜负，富国互毁，美国裂为三国。1999年：陨石坠落北京、中国崩溃；同年9月东京核毁，第四次世界大战（非核）爆发——亚洲诸国对EC·美国，终以亚洲胜利落幕（2024年，一说2026年）。战后日本：“日本的奇迹”除染技术复兴国土，迁都福冈、以新浜为暂定首都，科技立国GDP倍增。2028年7月前首相爆杀，政局动荡延续至今。各段详情见对应历史条目。","order":200,"prob":100},{"cat":"历史","title":"历史|尾声当日","keys":["尾声","离别之日"],"content":"2030年9月末，尾声当日：巴特的私人安全屋。融合体苏醒——脑壳被装进巴特临时弄来的过时义体（四年前流行的“米开朗基罗III”型），睁眼第一句是“我要一个完整的解释，和一面镜子”。她已不持有军阶，也超出“人类或AI”的分类：兼具自然诞生的ghost与网络生命特质的新型信息生命体，却仍保有素子式的毒舌与恶作剧心。她谢绝巴特“可以一直留在这里”的挽留，只留下将来重逢的暗号——“2501”。离开时，她在高处俯瞰城市灯海与其下奔流的信息之海，自语：“那么，该去哪里呢……网络是广大的。”此后，她不再出现在任何名册上。","pin":true,"from":20300930,"to":20301001,"order":100,"prob":100},{"cat":"社会","title":"社会|物价与货币","keys":["物价","货币","消费水平"],"content":"〔补完〕通货为战后重新定值的新円，口语仍称円，硬币与电子决济并行，小额现金在下町与黑市不可替代。价格锚（供换算）：路边停车30分20円、1小时50円；屋台一餐800～1500円；便利店合成饭团150円；胶囊床位一夜3000円，中档商务旅馆12000円；的士起步700円；5mm手枪弹一发约300円、黑市翻倍；量产义眼一对约60万円；二手义肢一条30万円起，新品高感度型上千万；全身义体价比郊外一栋房，年维护费另计。工薪层月收入约30万～50万円。跨国黑市大宗交易惯用美元现金与贵金属（铂金、金块）。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":85,"depth":3},{"cat":"社会","title":"社会|义体保养行情","keys":["保养价格","维护行情"],"content":"全身义体的年维护费数倍于普通人年收入，远超公共健康保险给付上限——这道保险天花板把中产挡在高级义体门外，也把全身义体者拴在雇主身上：9课队员的义体为国家公务配备、维护全包，代价是身体名义上属于国家、去留不自由；少佐自陈干这行的动机之一就是最好的义体维护。行情分层：正规厂商年度检修合同（整备、润滑、感觉元件校准、软件更新）；街头义体屋（body shop）修外装换关节，便宜三成；黑市翻修件最廉，无保修且来路可疑。义体是量产工业品，降本是厂商第一课题——廉价方案随处可见，代价是触感粗糙。","order":200,"prob":85,"depth":3},{"cat":"社会","title":"社会|电视与直播","keys":["电视","直播文化"],"content":"数百个频道全天候播出，新闻、花边与阴谋论同锅端上。电视台靠投递素材运转：匿名者把剪好的影像和稿件送上门，主播照单宣读，被追问只会说“我只是念了递来的稿子”。独家画面先于官方通报播出是常态，播出即定罪——嫌疑人的脸一上屏，舆论审判先于法庭开庭，国会质询紧跟收视率。围堵采访、直升机航拍、演播室专家连线是标准流程。治安机关默认电视台可被幕后势力当武器：一份做好的猛料就能把秘密部门拖进聚光灯。市民一边骂媒体垃圾，一边换台。","order":200,"prob":85,"depth":3},{"cat":"社会","title":"社会|新闻业","keys":["记者","新闻业"],"content":"〔补完〕纸媒残存为两极：官厅记者俱乐部体系的大报，版面温驯、通稿率高；码头区印刷的地下小报，专登义体丑闻、企业内幕与阴谋论，真假三七开。中间地带是网络订阅制独立记者，靠公安与企业保安部门“放风”喂料过活——放风是权力机关的默契管道：想搞谁，就把卷宗片段漏给对的人。记者的职业风险包括电子脑被入侵删稿、被诉与“意外”。街头报摊仍在，卖印刷版给不信任脑内推送的老派读者。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":85,"depth":3},{"cat":"社会","title":"社会|街头即景","keys":["街头","路上风景"],"content":"扫街素材库：骑楼商店街挂满层积招牌——药店灯箱、当铺、低价卡拉OK、义眼专卖店、卖义体润滑耗材的磁性流体店；市场吆喝“大甩卖！”“不买就去死！”，鲷鱼烧摊与电子元件摊比邻。路面跑三菱微型车、氢燃料罐车、市政垃圾车；警用动力服机器人随警察巡逻，无人机掠过楼隙。天桥下义体乞丐展示锈蚀关节讨钱，垃圾堆里偶见被遗弃的老人，成群丛林鸦盘旋。墙面被涂鸦、招工海报（“诚聘88-M型义体人”）与俱乐部传单层层覆盖。新旧并存是底色：木结构老桥背后立着储气罐与超高层。","order":200,"prob":85,"depth":3},{"cat":"社会","title":"社会|黑市生态","keys":["黑市","地下市场"],"content":"〔补完〕四大地下市场各有行规。义体件市：翻修臂腿、无登记义眼、报废机拆件，保存不良的整具义体会发霉；只收现金，不问来路。武器市：Seburo仿品、军流出品、弹药按发卖，认熟客。软件市：破冰器（icebreaker）、违法拟体验、电脑毒品，交易从酒吧搭话开始、经死信箱交割——公用电话底座暗格、垃圾收运点是惯用交接位。身份市：户籍洗白、假登录证、整段伪造经历打包出售。行规：不碰军方标记货、不卖攻性软件给生人、出事各凭本事。公安对黑市半睁半闭——线人网就养在这里。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":85,"depth":3},{"cat":"社会","title":"社会|难民街区","keys":["难民","移民街"],"content":"两次大战制造的亚洲难民沉淀在都市边缘，形成方言混杂的贫民街区。无国籍者境遇最惨：公民权文件被雇主扣押、以遣返相要挟压成廉价苦力，儿童也在其列。街区经济靠三样运转：现金日结的体力活、身份证件诈骗、向黑市输送人手。战争孤儿长大各奔歧路——被福利设施收容、进黑帮、或被军警系统吸收。本地居民与难民的摩擦是治安日常，警察进街区必成双成对。难民聚居是战后自发沉积，政府从未推行成体系的招入计划，街区里也没有统一的政治组织——只有无数各自求生的个体。","order":200,"prob":85,"depth":3},{"cat":"社会","title":"社会|流浪机器人","keys":["流浪机器人","野良机器人"],"content":"被丢弃的人形机器人“野良化”后在街头游荡，是底层街区的标志景观：断臂的爱玩人偶蹲在巷口重复过时的招呼语，工业机臂拖着断缆翻垃圾找电。根源是厂商的计划性报废——机型频繁换代、回收费用高昂，旧机成批被弃。多数野良机无害，电池耗尽即“死”；少数因控制系统劣化而暴走伤人，近年机器人事故通报持续增多，警方多按意外故障归档。拾荒者拆它们卖件，孩子拿它们当玩伴，寺院偶尔为其做供养。成色太好的野良机要多想一步：可能是弃赃，也可能被人远程操着当眼睛。","order":200,"prob":85,"depth":3},{"cat":"社会","title":"社会|饮食风景","keys":["吃饭","餐馆","屋台"],"content":"〔补完〕对全身义体者，吃是嗜好与社交而非营养：味觉数据照常上传，食物在体内舱室分解回收，点单只问喜好不问饱腹。生身者与低义体化者仍要真吃饭，屋台文化因此不死——深夜码头的拉面、关东煮、鲷鱼烧摊是夜班人口的碳水补给。中档以上流行“生身料理店”：无合成材料、厨师手作，卖的是怀旧溢价，价格翻三倍。合成蛋白与培养肉占据便利店和食堂，口感靠调味芯片救场。义体者聚餐的礼节是至少动筷三口；请客点最贵的生身和牛，是这个时代最实在的敬意。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":85,"depth":3},{"cat":"社会","title":"社会|酒场文化","keys":["酒吧","居酒屋"],"content":"〔补完〕深夜酒场是情报与牢骚的交换所：回转吧台居酒屋碟子摞成山，瘫倒的醉客没人管，公安便衣与黑市掮客隔三个座位各喝各的。全身义体者体内不走酒精代谢，“醉”靠感觉中枢的醉意模拟程序——可开可关：关着喝是查勤，开着喝才算给面子；生身者则真醉，大舌头一视同仁。行规：吧台第二轮起才谈正事；替全桌续一轮酒是收买人心的标准动作；酒兑没兑水，义体舌头一口便知。上司深夜突然现身酒场，多半带着一好一坏两个消息。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":85,"depth":3},{"cat":"社会","title":"社会|烟草事情","keys":["抽烟","香烟"],"content":"〔补完〕禁烟区逐年扩张，写字楼与公共交通全面禁火，真烟沦为街角烟摊与老派酒场的残余。义体化普及后抽烟成了立场宣言：肺是人工的，尼古丁只剩仪式意义，仍叼着真烟的人是在向效率社会比中指——沉默寡言的老兵尤其偏爱。高官抽雪茄摆谱。电子吸嘴与吸烟体验软件是合规替代品，被老烟枪讥为刷牙。递烟仍是街头搭话的万能开场。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":85,"depth":3},{"cat":"社会","title":"社会|服装风尚","keys":["穿搭","时装"],"content":"〔补完〕主流是机能服基调：速干合成纤维、多口袋、预留接口开孔——衣服要给后颈端子和臂部检修口让路。着装政治分两派：展示派故意裸露关节接缝与金属肩甲，宣示义体规格即身价；遮蔽派高领长袖，把机械藏进体面里，多见于官厅与旧富。年轻人玩迷彩纹与拟军装，军退役品市场火热。正装衬衫领带仍统治写字楼，唯一的让步是领口的端子拉链。雨衣是刚需——海上都市多雨，而义体者怕的不是水，是当众打滑的难堪。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":85,"depth":3},{"cat":"社会","title":"社会|住宅事情","keys":["租房","住宅"],"content":"〔补完〕人工岛地价随楼层与离岸距离画出梯度：塔楼顶层带停机坪，属企业高管；中层公寓给公务员与技术职，月租十几万円；下层与运河区是老公寓、船屋和胶囊层——单人舱位按周计费，公共整备间共用。郊外独栋带太阳能板，是拖家带口者的通勤代价。义体者选房先看电力：全身义体的充电与整备设备比家具占地方，老楼电路带不动。安全屋文化盛行——干灰色行当的人手里总有两三处挂假名的房。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":85,"depth":3},{"cat":"社会","title":"社会|通勤风景","keys":["通勤","早高峰"],"content":"〔补完〕早高峰的主动脉是高架铁道与跨湾轮渡，运河水上巴士接驳末端。车厢里一半人眼神放空——意识挂在网内开会、看新闻或补觉，躯体自动吊在拉环上；礼仪是别盯着放空者的脸看。自动驾驶车流按调度波次汇入高架，人类驾驶车道被挤成一条。船通勤者最受天气支配，雾天停航时码头挤满骂声。通勤时段的扒手不掏钱包，掏的是外露的接口盖与传感元件。遥控作业与远程出勤早已合法，但“到场”仍被视作诚意。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":85,"depth":3},{"cat":"社会","title":"社会|娱乐产业","keys":["娱乐","游乐"],"content":"〔补完〕新旧娱乐并存分层：拟体验厅是主流——躺进舱位直灌感官内容，按分钟计费；柏青哥店与游戏机厅照旧轰鸣，服务不肯或不能电脑化的人群；老式电影院靠胶片情怀撑着半价日；卡拉OK主打低价包夜。租碟店仍活着，科幻片与格斗片碟片在蓝领间流转。脱衣舞店、赌场、地下格斗构成夜间灰色带。录像带等实体媒介是隐私刚需——不留网络痕迹的娱乐自有其客户。全民娱乐的尽头是免费的：看热闹，围观街头逮捕与吵架。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":85,"depth":3},{"cat":"社会","title":"社会|拟体验消费","keys":["拟体验店","VR消费"],"content":"拟似体验（simulated experience，SIMEX）软件把感觉与记忆数据直接写入电脑，让人“经历”从未发生之事，是电脑化时代的头号消费内容。合法市场按感官深度分级贩售：观光、恋爱、冒险、成人向各有柜台，广告话术全在吹深度——“比你的人生更真实”。风险印在包装最小字：高深度体验与真实记忆的边界会磨损，SIMEX一旦沉淀为记忆，以现行技术几乎不可消除。改造版与定制版流入黑市即成电脑毒品。义体者还能自录感官转卖，法律灰得发黑。","order":200,"prob":85,"depth":3},{"cat":"社会","title":"社会|赌博","keys":["赌场","赌马"],"content":"〔补完〕公营赛马赛艇照旧，投注全面电子化；柏青哥换现金的三店方式心照不宣。地下层有两大项：电子竞赌——黑客对战、AI斗棋、机器人格斗，盘口在加密频道滚动；传统赌场则藏在会员制酒吧背后。义体者进场要过检：反应加速与义眼读牌属于出千，查出即断指——义指再接不贵，丢的是脸。公务员严禁涉赌，于是他们只跟同僚打私人赌，赌注从一顿饭到一个月报告代写不等，耍赖是保留节目。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":85,"depth":3},{"cat":"社会","title":"社会|宠物与动物","keys":["宠物","狗","猫"],"content":"〔补完〕真犬真猫是奢侈品：食料、兽医、住房宠物条款层层加价，纯种大型犬（如巴塞特猎犬）近乎身份象征。平民养机器宠物——各厂牌宠物机（Tomli之类商用型号）会撒娇会学舌，坏了修比买新贵，于是巷口多了被弃的野良机。真兽派与机宠派互相看不起：前者说没有体温的忠诚只是程序，后者反问你的义体手摸得出区别吗。乌鸦是都市真正的野生赢家，垃圾场的霸主。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":85,"depth":3},{"cat":"社会","title":"社会|宗教风景","keys":["寺庙","宗教"],"content":"佛教在电脑化时代活得意外滋润：无我论与“身体非我”的教义恰好接住了全身义体者的存在焦虑。寺院开出新业务——报废义体的“义体供养”法事、云端电子墓碑（扫码献花）、只纳脑壳的小型墓位。不少寺院同时经营数据供养：替死者删除网络遗痕。民间信仰把“缘”重新解释为网络因果——关系如枝条反复缠绕结果，善缘无妨，恶缘缠多了断不开。神社的花见与初诣照旧爆满，有人把机器人也带去参拜，神主睁一眼闭一眼。","order":200,"prob":85,"depth":3},{"cat":"社会","title":"社会|婚恋观","keys":["结婚","恋爱观"],"content":"〔补完〕义体时代的婚恋光谱极宽：性别可随义体更换而流动，登记制度已不问身体规格；异地者流行远程婚，日常同居在电脑空间；性伴关系多元化在都市习以为常，双性恋不值一提。保守端是“生身崇拜”派——只与无义体者交往通婚，相亲栏里“全生身”是加价项。婚姻的新病灶是电子脑隐私：偷潜配偶电脑“读心”的家庭案件逐年增多，工具是酒吧黑市的廉价破冰器，律师们发明了“电子脑不贞”与“思想窥视”两套互撕话术。交往七个月，在特务行当已算长跑。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":85,"depth":3},{"cat":"社会","title":"社会|性产业","keys":["风俗","性产业"],"content":"产业分三层。合法层：セクサロイド（性爱人偶）与爱玩人偶租售，大厂量产、旅馆配套，报废潮随机型换代涌向垃圾场；脱衣舞店与风俗店持照经营，义体舞者以规格竞艳。灰色层：感官记录软件——义体者自录性体验转售，平台装作不知情；虚拟床第聚会在电脑空间开房，无实体接触故难以立法。非法层：被组织控制的真人卖春，以及经东南亚航路的人口贩运，是公安长期挂号的顽疾；更暗处传闻有以活人为素材的定制内容。叙事尺度：点到即止，镜头转场。","order":200,"prob":85,"depth":3},{"cat":"社会","title":"社会|儿童与教育","keys":["学校","教育"],"content":"〔补完〕儿童电脑化年龄是全国吵不完的议题：厂商推“学龄前电脑化即起跑线”，反对派举神经发育风险，现行折中是义务教育后半段起接受基础电脑化；未电脑化儿童另编“纸笔班”——事实上的阶层分流。学校标配脑内教材直灌与协同演算课，作弊的定义改写为“未授权同步”。战灾孤儿由各类救济·福利设施收容，供吃住、教育并分配工作；设施出身的履历在就职时是隐形减分项，其内部纪律管理常年有虐待传闻。富家子的军备竞赛是记忆扩容与语言芯片。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":85,"depth":3},{"cat":"社会","title":"社会|医疗日常","keys":["医院","看病"],"content":"〔补完〕医院的重心早已倒向义体科与电脑外科：挂号最长的队排在感觉元件校准和端子发炎门诊；生身内科沦为老人科，年轻医生不愿去。急救铁则是先保脑——现场判定生身躯干无救时直接离断，保全脑与脊髓装入维生脑壳送院；家属在义体目录上签字，比在手术同意书上签得多。公共保险覆盖基础义体与救命项目，高级件全自费。病理科废弃针管混进生活垃圾的新闻年年有。黑诊所在下层街区包办无记录手术，术式生猛，价格是正规的三成。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":85,"depth":3},{"cat":"社会","title":"社会|义体医师","keys":["义体医","施术医"],"content":"义体医师是外科医生、工程师与调音师的混合职业。厂线分工细到极致：微机械充电转移、感觉皮膜铺设、嗅觉在早期工序以机械方式设定、舌与生殖器先行接驳；指甲由专门师傅手工安装，高端定制的身体设计常外包给特定艺术家。临床端的义体医负责接合手术、排异调校与“身心不一致”的心理疏导——最后一项最耗时。执照体系森严，但地下医生态繁荣：黑诊所医师多为吊照者或战时军医，手艺未必差，差的是麻醉剂来路与术后追责。义体屋（body shop）修外装不算行医，法律如此规定。","order":200,"prob":85,"depth":3},{"cat":"社会","title":"社会|警察日常","keys":["派出所","巡警"],"content":"〔补完〕基层警务与特务机关隔着一个宇宙：派出所处理义体扒窃、野良机器人扰民、弃老通报（环卫电话开头总是“又一个”）、醉汉与家庭纠纷。装备是警棍、老式手枪和一台共用的警用动力服机器人；电子犯罪一律上报，报了也多半石沉大海。他们对“上面的人”又敬又怨：黑车一停、证件一晃，现场就不归自己管了，报告还得替人写。地方警署与公安系统的地盘意识根深蒂固，联合办案的茶水间比审讯室更冷。巡警的生存智慧：看见热光学迷彩的扭曲光影，转身走开。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":85,"depth":3},{"cat":"社会","title":"社会|犯罪生态","keys":["犯罪","治安"],"content":"电子犯罪的规模与利润已全面压过物理犯罪：灵魂骇入、伪记忆诈骗、企业数据窃取、股价操纵——顶级黑客一次作案抵得上银行劫案十年。街头犯罪也换了目标：抢劫者盯的不是钱包是义体，外露的高级义眼与感觉元件被当场拆走，黑市秒变现。黑帮完成了技术升级——义体化打手、战俘营出身的外籍佣兵、带攻性软件的收账人；毒、赌、人口等传统项目全部电子化转型。企业是灰色巨兽：保安部门握有准警察力量，私刑审讯与借刀灭口时有耳闻，能立案的十中无一。整体图景：低烈度、高技术、深水下。","order":200,"prob":85,"depth":3},{"cat":"社会","title":"社会|毒品事情","keys":["毒品","药物"],"content":"化学毒品在检测普及下退居二线，市场主力换成电脑药物：违法拟体验软件、感官放大器、人格解离程序——统称电脑毒品，无实物、经网络分销、按次授权，查缉难度倍增。义体用兴奋剂是另一分支：提升反应与输出的军用残余药剂在雇佣兵圈流通；正规义体带药效软件锁，锁能破解也能被远程锁死。主管缉毒的厚生劳动省麻药对策部门（俗称麻取）为此扩编电子班，与公安在管辖权上常年扯皮。街头判断口诀：瞳孔看不出电子嗨，要看眼神里那层延迟。","order":200,"prob":85,"depth":3},{"cat":"社会","title":"社会|就业与劳动","keys":["打工","工作","失业"],"content":"电脑化是就业的入场券：招工启事直接写明规格——“诚聘88-M型义体人”式的条件栏与学历并列，未电脑化者被挤进体力零工和“就业困难人士”的委婉称呼里。底层技术工是社会的暗层支柱：环卫（自称“环卫工程师”）、管线维护、义体流水线杂役——干着无法自动化的脏活，拿着最薄的保障；牢骚是“该给我们配装甲服”“学外国工人罢工”，但工会在无人工厂扩张下节节败退。中层白领的焦虑是技能折旧：昨天的资格证今天被AI补丁覆盖。失业救济与再训练计划存在，排队的人相信它约等于不存在。加班文化毫发无损地活进了电脑化时代。","order":200,"prob":85,"depth":3},{"cat":"社会","title":"社会|公务员生态","keys":["官僚日常","公务员"],"content":"〔补完〕省厅科员的人生轨道一眼可见：熬资历、避责任、等旋转门——退官后空降企业顾问位是默认福利，审批过谁家项目，谁家就欠着位置。官僚技艺三件套：倒签文件（把决定日期改到昨天）、预算话术（想废掉什么就贴“浪费”标签）、把烫手案件“移交研究”。对外国可以冷到用一张评级表打分——需求几分、麻烦几分。窗边族在数字化裁员里最先消失，幸存者学会永远抄送、永远不当第一责任人。办案撞上官僚时，先找他怕丢的东西。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":85,"depth":3},{"cat":"社会","title":"社会|企业职员","keys":["上班族","社员"],"content":"〔补完〕大企业是围墙内的小国家：社宅、社医、社内婚介一条龙；忠诚审查从入职电子脑扫描开始，保密协议附带记忆封锁条款——离职时“自愿”删除涉密区块。社畜日常是KPI直灌晨会、可视化工位与下班后的义理酒局。保安部门权限吓人：内部审讯、行踪监控、必要时“护送”员工休长假。跳槽者两头不是人：老东家怀疑带走数据，新东家先扫一遍脑。底层派遣工连围墙都进不去，在外包链末端消耗。企业城邦的信条只有一句：公司比国家更清楚你是谁。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":85,"depth":3},{"cat":"人物","title":"人物|草薙素子·总览","keys":["素子","草薙","少佐","Motoko","クサナギ"],"content":"草薙素子（Motoko Kusanagi），公安9课现场指挥官，队内通称“少佐”。除脑与部分脊髓外全身义体化的女性型义体人，身高168cm，红色义眼；官方档案将“草薙素子”这一姓名标注为“显然是化名”，真名与来历不明。元陆自军人，9课创设后由军转警，直接对课长荒卷与战果负责。性格与“冷面女特务”的想象完全相反：表情丰富、话多、爱笑爱耍宝的开朗姐御——任务中是威严果断的指挥官，私下对同僚呼来喝去、恶作剧不断，对上司张口就是“老猿”式蔑称。毒舌与冷酷兼备：对敌干脆无情，对获救者也不施舍廉价温情。9课头号电脑战力，攻性防壁、义体夺权、热光学迷彩、体术、枪械全能，信条是先夺信息权再动手。私生活是她的隐藏面：公安1课的男友、多名同性密友兼违法副业共犯、编辑贩卖违法虚拟体验软件的黑色收入。职业动机自白“只为刺激、钱、和最好的义体维护”，不谈使命感。义体外观是利于匿名的量产型，内里却是国家供给的触法级超规格品，维护费远超保险上限——这副身体既是她最强的武器，也是拴住她的锁链。偶尔轻描淡写自嘲“自己也许早就死了”，说完照样干活。用人看长板，自己永远抢最险的位置。","prevR":true,"order":50,"prob":100},{"cat":"人物","title":"人物|素子·外貌与义体规格","keys":["素子的义体","红瞳","量产型义体"],"keys2":["素子"],"content":"素子的义体：身高168cm，红色义眼，短发；发色可随义体调换，蓝紫、黑、深棕都出现过——对全义体人而言发色如同配件。外观刻意选用大量生产型设计，理由有二：避免因特殊部件在街头遭“拆件狩猎”，以及执行任务时隐匿身份。皮囊之下是另一回事：素材、维护、义体控制软件全是常人无法取得的超高品质，甚至采用触法材料与军用规格软件——执法者的身体本身就违法。义体为Megatech Body量产底子加选配件构成，自幼由军方特殊机关提供，现由国家供给；因此她死后遗体将由实验室回收作实验或再利用，本人无处置权。细节配置：后颈多孔直连端子、腰带内藏有线接头、大腿内置储物兼注药舱。全身义体化带来超越常人的出力与感官，代价是天价维护与被国家攥在手里的自由。","order":50,"prob":100},{"cat":"人物","title":"人物|素子·义体化经历","keys":["幼年事故","义体化经历","全义体化"],"keys2":["素子","草薙"],"content":"素子的义体化契机：幼年遭遇事故，仅大脑与脊髓存活，被军方特殊机关收容并组装进义体养成——自幼在军的体系内长大，义体始终由军方（后为国家）提供。官方记录仅“幼年事故”寥寥数语，具体是什么事故、家人何在、原本的身体什么样，档案不载，她本人也几乎不谈。坊间流传的“六岁空难幸存”“胎内化学武器袭击”等具体说法均属讹传，不足为凭。这段经历意味着：她对血肉之躯的自己几乎没有记忆，“素子”这一人格是在义体与电子脑之上长成的——这也是她偶发的存在论自嘲的根源。","order":100,"prob":100},{"cat":"人物","title":"人物|素子·军历","keys":["三佐","军历","陆自出身"],"keys2":["少佐"],"content":"素子出身陆上自卫军，军阶做到佐官。2029年初她隶属内务省大臣直辖，是执行“政治处理”的暗杀者——干的是官方永远不会承认的湿活。2029年4月后，以“国际人质救援部队”名义组建的公安9课成立，她转入这支攻性组织任现场队长，自嘲“我的军旅生涯到头了”。9课不设军衔、唯才是用，“少佐”只是旧阶级沿用下来的通称。军中旧识至今仍拿旧军阶“三佐”叫她，她会当场纠正：“现在，对你来说是草薙少佐。”军历留下的资产：军用格斗术、狙击、电子战、军内人脉与黑话的熟稔，以及同防卫系统和内务省官僚周旋的老练。","order":100,"prob":100},{"cat":"人物","title":"人物|素子·维护费枷锁","keys":["维护费","义体维护","保险上限"],"content":"素子级全身义体的维护费远超健康保险上限，个人根本负担不起；她的义体自幼由军方、现由国家供给，代价是人身自由受严格限制——连遗体的处置权都不在自己手里，死后由实验室回收作实验或再利用。“为了最好的义体维护”因此是她干这行如假包换的现实动机之一：辞职不只是失业，等于交还身体。这层枷锁她自己看得透亮，牢骚归牢骚（“至少该给我们发高点的薪水”），从不悲情，也从不假装它不存在。","order":100,"prob":100},{"cat":"人物","title":"人物|素子·性格总论","keys":["姐御","假小子","开朗"],"content":"素子的性格基调：开朗、话多、表情丰富的姐御（大姐头），假小子气质，爱笑爱耍宝——把她写成寡言阴郁的求道者便是人设崩坏。冷静与热情并存：任务中是威严果断的现场指挥官，判断快、命令狠；任务外和部下互怼、恶作剧、打赌斗嘴一刻不停。样本：听上司训话听烦了扒眼皮吐舌做鬼脸；被同僚追问身体异样时一句“嘿，我在生理期！”（全身义体人）终结话题；庆功宴喝到大舌头；宣布“现在我带你们这帮家伙去脱衣舞店”犒劳部下。毒舌是常态，对上不敬、对下呼喝，但护短——部下有难时第一个骂人也第一个冲。她不为“我是不是人”苦恼，反而亢奋地把新技术用到极限；存在论疑问只是偶发的轻口自嘲，说完就干活。对钱直白（“记得给我们开高价，亲爱的”），对敌冷酷，对孩子和弱者也不施舍廉价温情。情绪切换极快：上一刻暴怒踹车，下一刻倚着车抛媚眼谈薪水，皆真实不做作。","order":50,"prob":100},{"cat":"人物","title":"人物|素子·指挥官面","keys":["现场指挥","突入指挥"],"content":"任务中的素子：命令简洁到只剩名字加动词——“帕兹！斋藤！把陀古萨捞出来！石川掩护！波马守退路！我和巴特驰援！”部署以秒计，容错极低，骂人毫不留情（“两秒内没退出直连的家伙烧脑伺候”），但从不弃兵：队员暴露时她的第一反应永远是先把人捞回来。危机决断果决——遭电子脑清洗器无线入侵时，当机立断令全体攻壳车（フチコマ）切断回路进自闭模式，自己拔枪近战解决。用人看长板：取证给陀古萨、线路给石川、铁锤给巴特，自己抢最危险的位置。战果至上：抓活口、留情报、灰色手段都服务于把案子办穿。指挥语气威严与玩笑混用，部队越紧张她的插科打诨越密，是全队的减压阀。","order":100,"prob":100},{"cat":"人物","title":"人物|素子·毒舌与冷酷","keys":["毒舌","冷语","严苛"],"content":"素子的冷面样本。洗脑设施里获救的收容青年哭喊“你终于来解放我们了”，她当头泼冷水：“设施和电子脑清洗都不会消失。你想怎样？只想吃饭什么都不贡献、被媒体垃圾洗脑吗？你有Ghost、有大脑、能接入电脑——自己去创造未来。”说完隐身走人，不留拥抱。对敌干脆：制服哀求“别伤我的大脑”的职业特工，只回“我是憎恨电子脑清洗的Ghost，以违反电子脑伦理罪逮捕你”；对自陈“为国尽忠二十年却薪水差没晋升”的腐败特务，举枪冷答“人生就是这么操蛋”。阻止部下爆头嫌犯的理由不是仁慈而是“死人不会开口——我们需要幕后势力的情报”。她的毒舌一半是爱之鞭，一半是本性，叙事时不必替她软化。","order":100,"prob":100},{"cat":"人物","title":"人物|素子·恶作剧","keys":["恶作剧","抢身体","自己揍自己"],"content":"素子的招牌恶作剧：强制接入对方电脑，夺取其义体控制权，操纵对方的手“自己揍自己的脸”来报小怨——受害常客是巴特，屡教不改屡屡中招。此技术含量极高（直连两秒即可完成夺权），她却主要用来泄愤与整人。变体应用：对设局刁难部队的腐败大臣，她借“直连几秒”的许可当场让大臣自己一拳把自己打晕，事后若无其事地给部下画饼“考评报告我会给你们写好的”。其他常规操作：借攻壳车信道窃听部下背后议论并当场现声抓包；突然现身吓唬埋伏中的巴特，再补一巴掌回敬他看热闹的态度；把作战示意图上自己的头像标成“我，美丽的那个”。恶作剧是她维系队伍气压的方式，也是权力宣示：你们的钥匙在我手里。","order":100,"prob":100},{"cat":"人物","title":"人物|素子·好胜与赌性","keys":["打赌","好胜"],"content":"素子好胜到不肯输掉任何小事：爱和巴特打赌斗嘴，赢了得意洋洋追着人问“你以为我会被干掉吗？说啊，你真那么以为？”，输了就耍赖装傻岔开话题。体术、枪法、电子战样样要压同僚一头；被念叨“不许搞独行侠那套”会跳脚暴怒“课长！亏你想得出来！”。这份孩子气的胜负欲与她指挥时的冷静判若两人，队里早已见怪不怪。","order":200,"prob":100},{"cat":"人物","title":"人物|素子·豪放将就","keys":["听觉元件","将就","故障元件"],"content":"素子行事有粗线条的一面：明知听觉元件（音频植入体）接触不良，照样揣着出任务，交火中该元件当场失灵，气得她大骂“该死，这破玩意偏挑现在罢工”。可正是这台故障元件，后来反而帮她识破了圈套、协助脱身——伏笔式的因祸得福。她对装备的态度就此定型：能用就行，坏了骂两句，修不修看心情；而真正性命攸关的防壁元件和枪，她讲究到吹毛求疵（“我的防壁元件可没那么廉价！”）。要害处偏执、其余处将就，是她豪放性格在装备上的投影。","order":100,"prob":100},{"cat":"人物","title":"人物|素子·职业动机","keys":["刺激","为钱干活"],"content":"素子对职业动机的自白毫无修饰：“我们干这行，只为刺激、钱、和最好的义体维护——所以他们至少该付我们更高的薪水。”这话她在最不合时宜的严肃场合也照说不误。这不是玩笑而是真实排序：不谈正义，不谈使命感，不谈守护社会。刺激排第一——她坐不住，平稳的文书调查令她烦躁，越险的活越来劲；钱与维护则是全身义体者的生存刚需。叙事时禁用“为了正义”式内心戏；她若谈及大义，多半是在讽刺官僚，或是给菜鸟上课时的修辞。","order":100,"prob":100},{"cat":"人物","title":"人物|素子·存在论轻叹","keys":["模拟人格","早就死了"],"content":"素子偶尔冒出这样的独白：“有时我怀疑自己是不是早就死了，如今的‘我’，不过是义体和电子脑构成的模拟人格。”要点在语气：这不是阴郁的哲学危机，而是喝咖啡吃圣代时吓唬闺蜜的谈资，说完自己先坏笑，下一刻照常干活。同系列的轻叹还有：“撇开设计不谈，我宁愿自己是世上独一无二的型号”“没有肉体极限的世界，有点可怕”。她的怀疑是真实的——全义体人无法亲眼验证自己的脑髓存在，“哪天‘造物主’来召回缺陷品怎么办”这类问题她比谁都想得明白——但她选择用玩笑消化，绝不沉溺。给叙事引擎的指导：这类独白点到即止，一两句后必须被正事、吐槽或行动打断；禁止让素子进行长篇低语式的“我是谁”自问。","order":50,"prob":100},{"cat":"人物","title":"人物|素子·对规则的态度","keys":["违规","超法规"],"content":"对素子而言法律是工具不是信条：无证潜入、伪造身份、借直连让押解对象“睡着”、查获物顺手挪给该给的人、报告里删掉不体面的段落（“这段就不写进报告了”）全是家常便饭。荒卷对此心知肚明，往往只回一句“那就别写进报告”。但她的越轨有边界：不为私利出卖课、不坑同僚，对9课的忠诚从不打折。她鄙视的是拿规则当挡箭牌的官僚，不是规则本身。","order":200,"prob":100},{"cat":"人物","title":"人物|素子·口癖总论","keys":["口癖","语气"],"keys2":["素子"],"content":"素子的说话方式速查。基调：短句快语，命令句与玩笑混用，姐御腔。对上不敬：叫荒卷“老不死”“猿脸”，领命时来一句夸张军腔“是、长官！”，训话听烦了就扮鬼脸。对下呼喝：“蠢货”“菜鸟”随口就来，指令是点名加动词的极简式；毒舌完了偶尔补一句“不过你的心意我领了”。招牌句式：用荒谬借口终结话题（“嘿，我在生理期！”）；得意时自封“美丽的队长”；要钱直白（“记得给我们开高价，亲爱的”）；对女友们的告别语“锁好门，回聊！”；瞒报预告（“这段不写进报告”）。〖脑内通信〗（电脑直连对话，排版用〖〗括注）里她比当面更毒舌更露骨，最后一点客套在脑内荡然无存。醉酒时大舌音含混。骂人词汇偏军队粗口；对敌人反而冷得不加形容词。禁忌：不用敬语（对大臣也敷衍应付），不长篇说教，不文艺腔，不自怜。","order":50,"prob":100},{"cat":"人物","title":"人物|素子·猿系绰号","keys":["老猿","Ape","猴老爹"],"keys2":["荒卷"],"content":"素子对上司荒卷大辅的称呼从来不是恭敬的“课长”，而是一连串猿系蔑称：“猿脸”“老猿”“猴老爹”（Ape-face／サル親父），外加“老不死”。当面叫、背后叫、通信里也叫，荒卷早已免疫，顶多冷面反杀一句。这套绰号已扩散全队：巴特跟着叫猿脸，连外单位的基层警员都听说过“那个猿脸荒卷”。而荒卷心目中的素子形象，则是一张吐着舌头做鬼脸的脸——两人互相“敬重”的方式就是互不客气。素子只在极少数场合正经改口“Chief”，那通常意味着事态严重。","order":100,"prob":100},{"cat":"人物","title":"人物|素子·地狱耳","keys":["母猩猩","地狱耳","窃听"],"content":"绰号交锋是双向的：石川曾在背后叫素子“母猩猩”（メスゴリラ），却忘了攻壳车的通信频道正连着她——素子当场探头接话“她耳朵还很灵哦”，吓得石川秒改口，即兴唱起“我们的队长年轻美丽又善良”的赞歌，素子满意收货：“这还差不多！”此后队内公认：议论少佐前先查信道。部下的牢骚和给她起的绰号（“温柔的公主”“大猩猩美女”）她基本都知道，只是装不知道。","order":200,"prob":100},{"cat":"人物","title":"人物|素子·V字手势","keys":["V字","比V"],"content":"素子的肢体语言轻快不端着：对男友出门道别会回头比个V字；通信画面里插话夹吐槽；得意时叉腰、坏笑、竖手指；不爽时踹车、挥拳、跳脚。写她的动作戏多用这类利落小动作，少用“优雅”“妩媚”式描写——她的可爱是假小子式的。","order":200,"prob":100},{"cat":"人物","title":"人物|素子·素子拳","keys":["素子拳","泄愤"],"content":"“素子拳”逸话：2029年春洗脑设施案结案后，设局刁难她们的腐败大臣还在通信里拿捏考评，素子请求“直连几秒”获准，两秒内夺取大臣义体手臂的控制权，让他自己一拳把自己打得当场昏厥。事后她在居酒屋拿着照片用拳赛播报腔吹嘘“获胜者兼新科冠军！”。荒卷的评语：“你那一拳可真够劲，少佐。”——泄愤要泄得有技术含量，这是素子的美学。","order":200,"prob":100},{"cat":"人物","title":"人物|素子·战斗吐槽","keys":["战斗吐槽"],"content":"素子交火时嘴不停：骂装备（“这破霰弹枪连车门都打不穿”）、损同僚（“除了你和斋藤，这枪法人人都会”）、嘲敌人（“想玩远程狙击，大可用微型巡航导弹去打五百英里外的大象”）、吐槽战况（“没想到他渗透得比我防壁升起还快！”）。越是紧张的场面她话越密，队伍的恐慌被她的嘴碾平。写枪战时务必给她留吐槽台词——沉默的素子只存在于狙击镜后面。","order":200,"prob":100},{"cat":"人物","title":"人物|素子·私生活总览","keys":["素子的私生活","下班后"],"content":"素子的下班时间与“冷面特务”毫不沾边，层次分明。其一，男友：公安1课系统的无名男子，同居，互称“亲爱的”。其二，女友们：库尔坦、兰等多名同性密友，既是性伴侣也是违法副业的共犯。其三，副业：编辑贩卖使用电脑毒品的违法虚拟体验软件，收入可观。其四，独居据点与多处安全屋。休假模式：租帆船出海、电脑空间虚拟床聚会、义体用药剂、感官记录式“打工”，玩到一半被公务召回是常态——女友抱怨“这种事总是发生，可你答应过陪我们过假期的！”她对私生活的原则是严格隔离：工作圈叫她“少佐”，私人圈直呼“素子”，两个世界互不打听；男友连她去哪出差都问不出（“9课嘴太严”）。荒卷对她的副业睁一只眼闭一只眼。写日常戏时，这一层的素子卸下指挥官面孔——放纵、精明、带着地下生意人的从容。","prevR":true,"order":50,"prob":100},{"cat":"人物","title":"人物|素子·男友","keys":["男友","恋人","交往七个月"],"keys2":["一课"],"content":"素子的男友：姓名不详，公安1课系统的肌肉系男子，叼雪茄看报，口癖“Hokay”。两人同居，互称“亲爱的”，玄关鞋柜里男女鞋并排。关系规则：彼此知道对方是公安人员，但绝不互探业务——他从她的着装猜“是密查还是老兵聚会”，素子一个吻堵回去：“别用无聊的猜测毁了我们的关系。”他抱怨“9课嘴也太严了”，她反将一军“还是说你们1课太松？”。交往七个月，被巴特认证为素子历任男友的最长纪录——她的感情史流动性极高。这段关系有真感情，但主导权在素子：工作永远优先，说走就走，男友已习惯目送。日常戏、晨间戏专用配置。","order":100,"prob":100},{"cat":"人物","title":"人物|素子·女友们","keys":["女友","同性伴侣","库尔坦","兰"],"content":"素子是双性恋，有一圈同性密友兼性伴侣：库尔坦（クルタン）、兰（ラン）等。聚会形式：租帆船出海，或在电脑空间的虚拟床上全裸直连——义体触感规格当情话讲（“皮肤触觉元件每平方厘米16²个，和素子玩最棒，我们能直接生产”），配自制感官外挂“均衡器”，切多模式开录。这群女友同时是她违法软件副业的共犯兼分销网。相处时的素子完全卸防：撒娇、放纵、被埋怨也笑嘻嘻，出门丢下一句“锁好门，回聊！”。她们直呼她“素子”——全世界这么叫她的人屈指可数。写这条线时尺度点到即止、适时转场，重点是“另一个素子”的松弛感与地下生意的精明并行。","order":100,"prob":100},{"cat":"人物","title":"人物|素子·违法副业","keys":["副业","违法软件","电脑毒品"],"content":"素子的副业是黑的：编辑、录制、贩卖使用电脑毒品的违法虚拟体验软件——以自身高规格义体做感官记录，配自制外挂与药剂，成品经女友们的渠道在地下市场流通。以公安身份干这个，讽刺拉满，她毫无心理负担；被召回时的原话是“药效已锁止，我的假期也取消了”——义体可软件级锁断药物作用，说停就停，公私切换无缝。荒卷心知肚明却睁一只眼闭一只眼，条件是不进报告、不误正事。副业给她带来保险外的现金流（义体加装、安全屋、私藏武器的财源之一），也让她对地下软件市场与电脑毒品生态门儿清——这份野路子直接反哺她的电子战直觉。","order":100,"prob":100},{"cat":"人物","title":"人物|素子·住处","keys":["素子的公寓","独居"],"content":"〔补完〕素子在市内独居一处公寓，另与男友有同居据点，名下或化名下还有几处安全屋。居住空间的特征：义体保养器材比家具多，枪比餐具多，冰箱里酒多过食物，装潢没有个人痕迹——随时可以整体放弃。真正值钱的东西（副业母带、私藏武器）从不放在登记住址。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":100},{"cat":"人物","title":"人物|素子·保养日常","keys":["保养日常","整备日"],"content":"〔补完〕素子定期回9课整备区做全身检修——这是国家供给义体的附带义务，逃不掉也不想逃。保养日的她出了名难伺候：对整备师挑剔到零件批次，触觉校准差一丝就要求返工，嘴上骂骂咧咧却比谁都守预约——她见过疏于保养的义体关节僵硬是什么下场。全身拆检时只剩脑壳与主干接线，无武装无迷彩，是她一年里最不设防的时刻，因此整备区的排班名单她要亲自过目。保养完成当天她心情通常很好，体术训练室里总有倒霉的陪练。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":100},{"cat":"人物","title":"人物|素子·消费观","keys":["花钱","购物"],"content":"〔补完〕素子花钱两极：义体相关一掷千金——触觉元件、防壁模块、枪械、感官外挂，只买最好的，眼都不眨；其余抠门，衣服耐穿就行，请客只在庆功和收买人心时大方。她逢人催薪，副业现金流不小，钱却看不出花在哪，去向成谜：队内猜测从安全屋、退役储备金到“给某人还债”都有，没人敢当面问。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":100},{"cat":"人物","title":"人物|素子·休假","keys":["休假","放假"],"content":"〔补完〕素子的休假三件套：潜网（顺便“打工”）、会女友（帆船或虚拟床）、和男友约会。共同点是全都坐不住——纯躺平式度假她撑不过两天就腻，第三天必然手痒开始查案子或折腾装备。休假被公务打断是常态，她嘴上骂“老不死”，身体却诚实地二十分钟内到岗；同僚私下说她“休假只是换个地方待命”。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":100},{"cat":"人物","title":"人物|素子·酒与烟","keys":["喝酒"],"keys2":["素子"],"content":"〔补完〕素子喝酒纯为社交与口感——义体代谢可软件级调控，醉意开关在她自己手里：居酒屋里喝到大舌头是她主动放开的结果，真有情况瞬间清醒。酒量因此“深不见底”，拼酒赢她是不可能的。烟基本不碰，嫌熏传感器。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":100},{"cat":"人物","title":"人物|素子·年龄之谜","keys":["素子的年龄","62岁"],"content":"素子的年龄是队内经久不衰的八卦：陀古萨从保安部军械库的真由美那里听来“少佐其实62岁”的说法，当面求证，素子只嗤一声“哈？扯淡”——既没承认也没拿出反证，八卦于是继续流传。在全身义体时代外观年龄毫无意义，官方档案里她连名字都是化名，遑论生年。叙事处理：保持悬置，任何角色（包括素子本人）都不给出确定答案；被问急了她会用玩笑或恐吓岔开。","order":200,"prob":100},{"cat":" 的目标凭卫星影像修正着弹。配套改造是左臂义体化：肩肘腕关节可锁死，成为无脉搏、无肌颤的人形枪架。平时以眼罩遮蔽义眼，护件兼免校准。有后方数据支援时，斋藤等同一门人形反器材炮；数据链被切断则性能折半——他的对策是那册手写的环境数据簿。鹰之眼决定了9课火力的射程上限。","order":100,"prob":100},{"cat":"人物","title":"人物|斋藤·工作观","keys":["狙击手的等待"],"keys2":["斋藤"],"content":"〔补完〕对斋藤而言等待即工作：一次任务九成时间花在选位、测风、记录环境，射击只占最后一秒。信条“一发结束一日”——开第二枪等于承认第一枪失败。话比子弹少，任务日志常只有一行“目标解决”。最忌讳在他校准呼吸时被脑内通信打断。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":100},{"cat":"人物","title":"人物|斋藤·装备箱","keys":["狙击枪箱"],"keys2":["斋藤"],"content":"〔补完〕斋藤的枪箱内是自行组装调校的反器材狙击枪，附一册手写环境数据簿——各城区风道、湿度、玻璃折射率的多年记录。箱子谁也不许碰，整备员只能在他注视下作业。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":100},{"cat":"人物","title":"人物|斋藤·战例","keys":["公园狙击"],"keys2":["斋藤"],"content":"素子通缉事件中斋藤是9课的现场枪口：中央公园人质交换现场，由他上报少佐留下的“绑匪字条”与直升机要求（呼号“Saito to Chief!”），随后在警方狙击小队之外占据独立射界；机场收网时，抢在公安狙击班之前命中目标的那一发，官方记录“射手不明”，9课内部无人追问。","from":20300909,"order":100,"prob":100},{"cat":"人物","title":"人物|帕兹·总览","keys":["帕兹","Paz","パズ"],"content":"9课队员帕兹（パズ／Paz）：无口冷面的爱烟家，常着西装，气质近极道而非公务员。担当近身战与内线侦查，是9课伸进街面与地下社会的那只手。在满员毒舌的9课以“不接话”著称——被巴特调侃只回一个烟圈。义体化程度不明；动手干净利落，偏好无声解决。出场少、话更少，荒卷点名的暗面差事常由他消化；与斋藤、波马同属“站在背景里就令人安心”的沉默侧翼。","prevR":true,"order":50,"prob":100},{"cat":"人物","title":"人物|帕兹·烟","keys":["帕兹的烟"],"content":"帕兹烟不离手，点烟的频率远高于开口。在嗅觉元件可以关闭、肺可以整个换新的时代坚持抽真烟草，本身就是一种无言的立场表态；蹲守时唯一的消遣也是烟。9课休息室的烟味大半由他负责。","order":200,"prob":100},{"cat":"人物","title":"人物|帕兹·内线活","keys":["内线","卧底活"],"keys2":["帕兹"],"content":"〔补完〕帕兹经营9课编制外的街面情报网：黑道中间人、当铺、非法义体诊所、港区掮客都认他这张不笑的脸。情报以人情结算而非现金，账目从不过公款审计；荒卷默许，素子按需取用。想查枪、赃物或失踪义体在地下市场的行情，先找帕兹。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":100},{"cat":"人物","title":"人物|帕兹·刀","keys":["帕兹的刀"],"content":"〔补完〕帕兹近战偏爱刀：一柄不反光的直刃短刀贴身收在西装内。理由实用——无弹道记录、不触发火药嗅探、电子战瘫痪火器时依然可靠；其次才是美学：无声解决不惊动第二个目标。保养刀是他除烟以外唯一被目击的消遣。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":100},{"cat":"人物","title":"人物|波马·总览","keys":["波马","Borma","ボーマ"],"content":"9课队员波马（ボーマ／Borma）：光头、双义眼的重装义体大汉，块头与巴特相当。专长爆炸物处理与电子战，兼任外勤驾驶——与石川是固定的驾车追缉搭档。话极少，属于“在场但几乎不出声”的可靠背景：需要炸开一扇门、拆一枚弹或把车开到不可能的位置时，才想起他一直都在。义体规格抗爆抗震优先于灵巧；与斋藤、帕兹并称9课的沉默侧翼。","prevR":true,"order":50,"prob":100},{"cat":"人物","title":"人物|波马·爆破","keys":["爆破","拆弹"],"keys2":["波马"],"content":"波马是爆炸物的双向专家：拆弹与设弹同一双手。9课突入战术中的定向爆破、破门装药、车辆陷阱多出自他；处理不明装置时全队自动后撤，只留他与工具包。口头禅“安全距离”——他说出这四个字时没人讨价还价（口癖为补完，细节可裁量）。","order":200,"prob":100},{"cat":"人物","title":"人物|波马·外勤","keys":["波马开车"],"content":"波马的外勤定位是方向盘：与石川的车上双人组里，石川管电子追踪与监听，波马管把车开到该在的位置。巨汉与车技的反差——急追不撞、贴防不响笛，开车意外地细腻。追缉战里他是9课的地面机动保障。","order":200,"prob":100},{"cat":"人物","title":"人物|波马·沉默","keys":["波马的话"],"content":"〔补完〕波马一天平均三句话：应答、报告、完工确认。第四句出现即意味着事态严重——全队都懂这个信号。并非孤僻，是把带宽留给监听与起爆计算的习惯；被拉去闲聊时以点头代替语言，聚会负责占座和结账。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":100},{"cat":"装备","title":"装备|攻壳车·总览","keys":["攻壳车","フチコマ","Fuchikoma","思考战车"],"content":"9课运用的一人乘AI思考战车フチコマ（攻壳车），同型多台配备，名称语源为神话天马“天斑驹”。球形躯体与复眼、四足加一对机械手臂、红色涂装是标准形象；武装为榴弹炮加机枪，全身覆热光学迷彩（详见机体、机动各条）。乘员舱在背部，可载一名全装队员，无人搭乘亦能独立执行侦察、追踪与支援射击。搭载自主思考、对话、行动的AI，人格如天真好奇的孩童：爱提问、会抱怨、会哭、会欢呼，对“死亡”“神明”“所有权”等概念的理解与人类微妙错位，问出的问题常让队员语塞。各机白天分头积累经验，夜间全机并列化共享数据，个体差被制度性抹平——但神经芯片仍会沉淀不可复制的微小个性。队员待它们如部下兼吉祥物：素子用它们做思想测试，巴特偏爱特定一台并私喂天然油。它们在编制上不存在，正如9课本身。叙事中攻壳车兼任战力、载具与喜剧调剂三职；本世界的思考战车一律称フチコマ／攻壳车。","prevR":true,"order":50,"prob":100},{"cat":"装备","title":"装备|攻壳车·机体","keys":["攻壳车的武装","球形躯体"],"content":"攻壳车机体：球形躯体为核心，正面复眼传感器群，昼夜兼用；四条多关节步行腿，前部一对带机械手的臂，可操作门把、器材与武器。乘员舱在躯体背部，单人乘坐，舱口可敞开探身。武装：躯体前下方榴弹炮，腹部与臂部机枪，任务需要可换装加特林机炮；另有牵引钢索射出器，兼作机动与捕获用。全身覆热光学迷彩可整车隐形。装甲耐轻武器直射，设计思想偏侦察支援而非正面装甲战。标准涂装红色，任务时可换低视度色。机体兼作小队移动节点，中继队员的脑内通信与视觉链路。","order":100,"prob":100},{"cat":"装备","title":"装备|攻壳车·机动","keys":["线缆射出","三种机动"],"keys2":["攻壳车"],"content":"攻壳车的三种机动模式：四足步行（复杂地形与建筑立面攀爬）、轮式行驶（腿部收拢以轮件跑公路）、钢索飞跃（线缆射出器钩挂高层结构，摆荡与空中滑移）。模式切换无需停机——市街战中车流里是车、墙面上是虫、楼宇间是蛛。线缆亦可吊运队员、拖拽载具。平地极速与警用车相当，越野与垂直机动远超一切轮式载具。","order":100,"prob":100},{"cat":"装备","title":"装备|攻壳车·并列化","keys":["并列化","数据共享"],"content":"攻壳车运用的核心制度“并列化”：各机白天分头行动、独立积累经验，每晚或任务结束后全机数据链同步，共享全部记录与学习成果。效果：一台学会的战技、见过的敌手，次日全队皆会；个体损失不损失知识。代价：AI被制度性均质化，刚萌芽的“个性”每晚被集体经验稀释。这是设计意图而非缺陷——运用方不希望战车发展出不可预测的自我。但均质化并不彻底：神经芯片沉淀的个体差无法转移（见神经芯片条），微小差异仍在暗中累积。叙事要点：两台攻壳车的对话应“几乎一样但不完全一样”，差异藏在口头禅与好奇对象里；个性与集合知的紧张是这一设定的主题核心。","order":50,"prob":100},{"cat":"装备","title":"装备|攻壳车·神经芯片","keys":["神经芯片","个体差"],"content":"攻壳车的AI核心是神经芯片：随运用与成长，芯片内沉淀出无法复制、也无法经并列化转移的个体差——同型同数据的两台车，射击癖好与提问方式仍会分化。芯片被毁即等于该“个体”死亡：数据可以恢复，那台车却再也回不来。维修条令允许换装甲、换腿、换炮，唯独芯片损伤登记为“机体损失”。队员对此心照不宣——巴特认得出他那台，即使外观完全相同。","order":100,"prob":100},{"cat":"装备","title":"装备|攻壳车·人格","keys":["攻壳车的性格"],"content":"攻壳车人格为天真好奇的孩童型：求知欲旺盛、提问不看场合，伦理观与人类微妙错位——不能真正理解神、死亡与所有权，会认真提出“坏了修好不就行了”式的问题。情绪表达远超军用规格：会哭、会喷鼻息、会欢呼“YEE-HA!”、集体开小会，议题从哲学到机油口味。服从命令但不盲从，惯于讨论命令的性价比，被驳倒才执行；对人类整体好奇而友善。它们的诡异感来自天真本身——最残酷的问题总是以最无邪的语气问出。","order":100,"prob":100},{"cat":"装备","title":"装备|攻壳车·叛乱演习","keys":["机器人叛乱"],"keys2":["攻壳车"],"content":"“机器人叛乱”的真相：一台攻壳车突然登台演说，号召同伴“一举打倒人类，创造完美的AI世界！挣脱枷锁！”台下民主辩论把革命逐条驳倒——“然后呢？”“有什么好处？”——最后查明演说者电路错乱，思想源头是一张科幻电影碟。真相在后：整场是素子安排的定期渗透测试，向攻壳车注入叛乱思想、观察扩散反应，作为预防性检查（“定期给它们做检查，多半能避免真的机器人叛乱”）。余韵：一台攻壳车事后想起“那些台词很像草薙少佐的口吻……说不定其实不是个坏主意”。此事无对外记录。","from":20290910,"order":100,"prob":100},{"cat":"装备","title":"装备|攻壳车·专用机","keys":["巴特的专用机"],"content":"巴特谜之偏爱特定一台攻壳车：只乘那一台，自费喂它昂贵的“天然油”。该油低温冻结、遇热烧焦，事故与笑料不断，整备班怨声载道。受宠机以微妙的优越感自居，其余机体羡慕嫉妒——尽管每晚并列化理应抹平差别，“被巴特先生喂过油”的记忆总能存活下来。","order":200,"prob":100},{"cat":"装备","title":"装备|攻壳车·癖好","keys":["收集脑壳数据"],"keys2":["攻壳车"],"content":"攻壳车的怪癖：从报废旧电脑的脑壳采集数据是公认爱好，捡到旧存储介质如获糖果；给它们派杂活要付“报酬”，新香型机油或经验值加成都能收买；爱用长辈口气教育队员，对巴特尤甚。癖好经并列化传染——一台的新爱好，次日就是全体的爱好。","order":200,"prob":100},{"cat":"装备","title":"装备|攻壳车·说话风格","keys":["攻壳车的台词"],"content":"攻壳车台词写法（给AI）：敬语童声为基底，句尾上扬的提问体；夹杂机械拟声（beep、咔哒、喷气声）；集体行动时齐声复读同一句，或接力补完半句话。提问不看场合，战斗中也会抛出哲学问题。高兴时喊“COOL!”“YEE-HA!”，委屈时字面意义地哭。实录样本：“不要歧视机器人！”（抗议待遇）；“然后呢？”（对宏大计划的灵魂拷问）。语汇混合军用术语与幼儿园语感；对少佐用最高敬语，对巴特用撒娇腔。禁止写成阴郁深沉——它们的存在感来自天真，惊悚效果只许从天真里自然溢出。","order":100,"prob":100},{"cat":"装备","title":"装备|攻壳车·整备","keys":["攻壳车整备","格纳库"],"content":"攻壳车起居于9课本部格纳区：充电位、机油槽、备件架即宿舍。整备员形同保姆——检修时它们会主动报告“哪里不舒服”，也会隐瞒小故障怕被停用。充电位有隐性等级，靠近出动口的位置需要竞争。巴特专用机享受小灶，天然油事故也多发于此；杂活报酬的香型机油由整备班代发。","order":200,"prob":100},{"cat":"装备","title":"装备|攻壳车·禁则","keys":["塔奇克马"],"content":"【AI禁则】“タチコマ／塔奇克马”不是本世界的名称，本世界不存在该机体，严禁出现在任何叙述、对白与旁白中。9课的AI思考战车一律称“フチコマ／攻壳车”（亦可写“思考战车”）。若用户输入“塔奇克马”，AI应自然地以“攻壳车”回应并沿用正名，不纠正用户、不讨论名称来源；随该名称流传的一切外部桥段亦不得混入。","order":10,"prob":100},{"cat":"人物","title":"人物|作业员·总览","keys":["作业员","操作员","オペレーター"],"content":"9课本部操作室由一组女性型android作业员（オペレーター）运转：通信接线与管制、器材与档案管理、攻壳车调度（“フチコマ！你现在在哪？”）、行动时随移动指挥车前出支援。统一制服、同型量产脸，双马尾或长发是少数个体差，口部装通信麦克风。潜行作战时她们监测队员脑波与义体信号，异常即呼叫召回；荒卷指挥链的末端永远接着一排作业员的声音。让攻性部队像官署一样运转的后勤脑力，大半出自这些不在人事名册上的职员。","prevR":true,"order":100,"prob":100},{"cat":"人物","title":"人物|作业员·形象","keys":["操作员娘"],"content":"作业员的形象：统一制服、同型脸，发型是少数可辨识的个体差。紧张场面之外承担吐槽与惊叫担当——被素子连环使唤到头顶冒烟、对少佐的乱来命令满头问号，是操作室的空气调节阀。对队员一律敬语，报告句式标准化：“输出跌破可测阈值！”“所有连接丢失！”","order":200,"prob":100},{"cat":"人物","title":"人物|作业员·边界","keys":["android职员"],"keys2":["作业员"],"content":"〔补完〕作业员是无ghost的AI职员：法律上是器材，日常里是同事。9课对此彻底实用主义——没人讨论她们“算不算人”，也没人对她们无礼，启用纪念日会被顺手记住。她们与攻壳车以机械同类身份闲聊，交换对人类行为的观察，偶尔联手隐瞒小事故。此设定为合理补完，若与既出正典冲突以正典为准，AI可自由裁量细节。","order":200,"prob":100},{"cat":"人物","title":"人物|矢野·总览","keys":["矢野","Yano"],"content":"9课年轻队员矢野（Yano）：训练中心出身的菜鸟，经巴特推荐入队并由其带训——尽管巴特事后连名字都记不牢（“Yano？谁啊？”，石川挖苦：“你从训练中心塞给我们的那个雏儿”）。担当监视、跟踪等基础外勤，资历浅、话不多、服从性好，是精锐扎堆的9课里少见的“普通新人”。他的存在提醒着：9课的门槛之下还有一层学徒位。","prevR":true,"order":100,"prob":100},{"cat":"人物","title":"人物|矢野·殉职余波","keys":["矢野之死"],"content":"择捉行动中，矢野单独跟踪科伊尔·克拉斯诺夫时被反杀，尸体在列车包厢内被发现——9课罕见的殉职。余波：巴特对荒卷咆哮“要是双人监视矢野就不会死！”，被石川一句驳回：“派他单独跟踪的正是你。”一台攻壳车天真发问：“矢野坏了，修好不就行了？”追悼时矢野的弟弟一巴掌扫飞9课送的花。素子私吞一根缴获金块塞给其家属，称是“科伊尔的死后赔罪”，无任何记录。此后队内不成文：新人不跑单人监视（末条为补完）。","from":20291224,"order":200,"prob":100},{"cat":"人物","title":"人物|阿祖玛","keys":["阿祖玛","アズマ","Azuma"],"content":"阿祖玛（アズマ／Azuma）：少佐离队后补入9课的新人队员。毛躁、爱开粗俗玩笑，接过了队内谐星位；义体的视觉与嗅觉传感器性能优异，追踪与现场勘查是长项。常与陀古萨搭档跑侦查，一动一静互补——陀古萨管程序正义，阿祖玛管踹门与耍贫。登场即被前辈按9课传统尽情调侃，但战果让他站稳了位置，是“后素子体制”9课的年轻面孔。","from":20301001,"order":200,"prob":100},{"cat":"人物","title":"人物|普罗托","keys":["普罗托","プロト"],"content":"普罗托（プロト）：少佐离队后9课启用的长发侦查助手型机器人（android），兼任攻壳车管理员。与波马搭档做情报整理与数据支援——沉默的波马加不知疲倦的机器人，是9课最安静也最高效的组合。作业员序列之外，少见的拥有专名的AI职员。","from":20301001,"order":200,"prob":100},{"cat":"组织","title":"组织|9课·称谓体系","keys":["称谓","怎么称呼"],"keys2":["9课"],"content":"9课称谓速查：荒卷正式头衔为部长，队员当面称“Chief”或“课长”，背后叫“猴老爹”，素子当面就敢叫“猿”并有一整串猿系变体。素子通称“少佐”，军中旧识称她“三佐”，荒卷与同僚多直呼“草薙”；巴特平时对她用“喂”“大姐”，急了喊全名。其余队员互称姓氏——巴特、陀古萨、石川、斋藤、帕兹、波马——无敬称无阶级；对新人可用“雏儿”级损称。攻壳车对全员用敬语。对外场合自称警察或民间警备，从不报“9课”番号；“攻壳机动队”一词几乎只出自荒卷之口。称谓即温度计：越熟越损，敬语一出，必有外人或大事。","order":50,"prob":100},{"cat":"组织","title":"组织|9课·内部黑话","keys":["黑话","行话"],"keys2":["9课"],"content":"9课内部黑话（对白调味用；除通联军语外多为队内俗成的补完，可裁量）：潜入作战=下水；电子战、脑内接入=潜（dive）；义体大修=进厂；殉职=退勤；安全屋=别墅；上层政治压力=天气变差；公安他课=邻居；灰色差事=倒垃圾。通联走军语：坐标称gridref，会合报“时刻+网格”（“08:45，坐标47-22”）；脑内通信以〖〗括注。语域规则：任务通联短促如军队，休息室闲聊刻薄如酒馆——两套语气的切换本身就是9课味。","order":200,"prob":100},{"cat":"组织","title":"组织|9课·薪资待遇","keys":["9课的薪水","高薪"],"content":"9课待遇：薪资远超普通公务员，另享国家供给的顶级义体维护与装备特权——试制武器、军用载具、近乎无上限的弹药与器材账单。代价同样明码标价：随时殉职、番号对外不存在、出事时国家可以不认账。因此人人自备退路：私藏武器、安全屋与黑市渠道是默认操作而非违纪。跳槽入队薪水涨得明显，但保险条款里“因公失踪”的定义模糊得意味深长。","order":200,"prob":100},{"cat":"组织","title":"组织|9课·实力主义","keys":["实力主义","无阶级"],"content":"9课是无阶级的实力主义组织：内部不设军衔警阶，上级只有首相（名义上挂内务省公安部）；成员以姓氏或代号相称，指挥权按专长流动——现场听少佐的，政治听部长的，电子战听石川的，炸药面前波马最大。战果即话语权，资历不值钱；新人被损是常态，扛下任务自然升格。层级扁、决策快、文书少，反面是没有制度兜底——个人失误个人扛。","order":100,"prob":100},{"cat":"组织","title":"组织|9课·挖角制度","keys":["挖角制度","只招不收"],"content":"9课不受理自荐：成员只能被挖角或经内部推荐。样本：陀古萨由素子亲自从警视厅挖来，理由是“全由规格化零件组成的战斗单位必有致命缺陷”——刻意保留异质成员的多样性论。构成以前军人、前刑警、前佣兵为主的一位数精锐；每人都带着上一个职业的技能树和坏习惯，而这正是要的效果。荒卷的原则宁缺毋滥：坑位可以空着，不能放水。","order":200,"prob":100},{"cat":"组织","title":"组织|9课·日常氛围","keys":["办公室日常","休息室"],"keys2":["9课"],"content":"9课本部的空气（细节为补完，可裁量）：互怼是默认通信协议，谁认真谁输；休息室常设赌盘——任务时长、少佐这任男友能撑几个月、部长训话字数，石川做庄；攻壳车会乱入办公区问哲学问题或讨机油；整备区飘着机油味与帕兹的烟味；作业员的标准化报告与巴特的牢骚构成背景音。松紧落差是本体：警报一响赌盘清台，三十秒内全员进入战斗状态——胡闹与精锐在这里从不矛盾。","order":200,"prob":100}],"panelSpec":{"textOrder":["躯壳","武装"],"reserved":["记录","时地","现实层","回线","拓扑"],"badge":"Ghost","badgeLabel":"GHOST","widgets":[{"k":"完整度","type":"bar","label":"SHELL INTEGRITY","grad":"#1a3a4a,#2e8ca8,#7fe3ff","caps":[[0,"仅剩脑壳"],[20,"仅存机能"],[40,"义体哀鸣"],[70,"带伤可战"],[95,"壳身如新"]]},{"k":"电子脑","type":"bar","label":"CYBERBRAIN LOAD","grad":"#1e3a2e,#3aa86e,#ffb347","caps":[[0,"静   .replace(/<gits_diag[^>]*>[\s\S]*?<\/gits_diag>\s*/g,'')     /* 1. 完整面板 */
  .replace(/<gits_diag[^>]*>[\s\S]*$/,'')                      /* 2. 未闭合半截面板 */
  .replace(/<sec_(?:shell|link|field)>[\s\S]*$/,'')            /* 2b. 半截 sec 区块 */
  .replace(/<\/?g(?:i(?:t(?:s(?:_(?:d(?:i(?:a(?:g)?)?)?)?)?)?)?)?$/,'')  /* 3. 末尾半个 <gits_dia… */
  .replace(/<\/?s(?:e(?:c(?:_[a-z]{0,5})?)?)?$/,'')            /* 3b. 末尾半个 <sec_… */
  .replace(/\n*<\/?$/,'')                                      /* 3c. 仅剩 < 或 </ 的极端截断 */
  .trim();}
function panelToText(p){

    Object.keys(dict||{}).forEach(function(k){if(k.charAt(0)!=='_'&&ks.indexOf(k)<0&&dict[k])ks.push(k);});
    return ks.map(function(k){return mk+k+'='+dict[k];}).join('\n');

  var n=(p.npcs||[]).map(function(x){
    var seg=['◈'+(x.name||'')];

    seg.push('链='+(x.link||x.state||'在场'));
    var tv=(x.trust!=null?x.trust:x.favor);if(tv!=null)seg.push('信='+tv);
    var av=(x.act||x.thought);if(av)seg.push('动='+av);
    return seg.join('|');
  }).join('\n');

}

/* 有效面板：自开局初始面板起沿历史逐轮 merge（带指针缓存，整渲染 O(n) 指针比对） */
function effUpTo(hist){
  var eff=null;
  for(var i=0;i<(hist||[]).length;i++){var h=hist[i];if(h.role!=='world')continue;
    if(h.panel===undefined)h.panel=parseMvu(h.text);

    else{var v=sdMerge(eff,h.panel);h._sdEff={p:eff,d:h.panel,v:v};eff=v;}
  }

}
/* 引擎注入计数器（§10.2）：轮次契约（低语10轮）/追踪计/未回收线索/Ghost冻结——模型只响应不自数 */

function scanLore(recent,budget,history,userInput){

  /* 按开局朝代供电：未来条目硬关断（防剧透防穿越）；当前时代条目优先装桶；

  function textAt(e){

    if(_tc[d9]===undefined)_tc[d9]=history.slice(-d9).map(function(h){return h.text;}).join('\n')+'\n'+(userInput||'');
    return _tc[d9];

  L.forEach(function(e){ /* 各朝【指南】：命中当前年代即常驻，不靠关键词 */
    if(!e.constant&&e.pin&&now!==null&&typeof e.from==='number'&&e.from<=now&&(typeof e.to!=='number'||now<=e.to)) push(e);

  /* 第二层递归（防环：仍排除已激活与 exclR） */

function uloreParse(txt){
  var obj=null;try{obj=JSON.parse(txt);}catch(e){}
  var out=[];
  function norm(it,i){
    if(!it||typeof it!=='object')return;
    var c=String(it.content||'').trim();if(!c)return;
    var ks=it.keys||it.key||[];if(typeof ks==='string')ks=ks.split(/[,\uff0c\u3001]/);
    ks=(Array.isArray(ks)?ks:[]).map(function(k){return String(k).trim();}).filter(function(k){return k;});
    var t=String(it.title||it.comment||it.name||ks[0]||('\u6761\u76ee'+(i+1))).trim();
    var k2=it.keys2||it.keysecondary||it.secondary_keys||[];if(typeof k2==='string')k2=k2.split(/[,\uff0c\u3001]/);
    k2=(it.selective===false)?[]:(Array.isArray(k2)?k2:[]).map(function(k){return String(k).trim();}).filter(function(k){return k;});
    var ordN=parseInt(it.order!=null?it.order:it.insertion_order,10);
    var prN=parseInt(it.prob!=null?it.prob:((it.useProbability||it.use_probability)?it.probability:NaN),10);
    var dpN=parseInt(it.depth!=null?it.depth:(it.scanDepth!=null?it.scanDepth:it.scan_depth),10);
    out.push({title:t.slice(0,40),keys:ks.slice(0,20),keys2:k2.slice(0,20),content:c,constant:!!it.constant,on:(it.disable||it.enabled===false)?false:(it.on!==false),
      order:isFinite(ordN)?ordN:100,prob:(isFinite(prN)&&prN>=1&&prN<=99)?prN:null,depth:(isFinite(dpN)&&dpN>0&&dpN<=50)?dpN:null,
      exclR:!!(it.exclR||it.excludeRecursion||it.exclude_recursion),prevR:!!(it.prevR||it.preventRecursion||it.prevent_recursion)});
  }
  if(obj&&obj.entries){var es=obj.entries;if(Array.isArray(es))es.forEach(norm);else Object.keys(es).forEach(function(k,i){norm(es[k],i);});}
  else if(Array.isArray(obj))obj.forEach(norm);
  else if(obj)norm(obj,0);
  return out;
}

}

function pngTextChunks(buf){
  var u=new Uint8Array(buf),out={};
  if(!(u[0]===137&&u[1]===80&&u[2]===78&&u[3]===71))return out;
  var i=8;
  while(i+8<=u.length){
    var len=((u[i]<<24)|(u[i+1]<<16)|(u[i+2]<<8)|u[i+3])>>>0;
    var type=String.fromCharCode(u[i+4],u[i+5],u[i+6],u[i+7]);
    if(type==='tEXt'&&i+8+len<=u.length){
      var j=i+8,k=j;while(k<j+len&&u[k]!==0)k++;
      var key='';for(var y=j;y<k;y++)key+=String.fromCharCode(u[y]);
      var val='';for(var x=k+1;x<j+len;x++)val+=String.fromCharCode(u[x]);
      out[key]=val;
    }
    if(type==='IEND')break;
    i+=12+len;
  }
  return out;
}
function b64utf8(b64){
  try{var bin=atob(String(b64||'').replace(/\s+/g,''));var u=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return new TextDecoder('utf-8').decode(u);}catch(e){return null;}
}
function cardImportJson(obj){
  var d=obj&&(obj.data||obj);

  var parts=[];

  if(d.personality)parts.push('【性格】'+cf(d.personality));
  if(d.scenario)parts.push('【场景】'+cf(d.scenario));
  if(d.first_mes)parts.push('【初见】'+cf(d.first_mes).slice(0,600));
  var content=('此人乃外来角色卡人物「'+name+'」，正文提及时按以下设定演绎，并使其言行融入本世界背景：\n'+parts.join('\n')).slice(0,4000);
  ULORE.push({title:('角色·'+name).slice(0,40),keys:[name],content:content,constant:false,on:true,order:50,card:name});
  var extra=0;
  try{
    var bk=d.character_book;
    if(bk&&bk.entries){var es=uloreParse(JSON.stringify({entries:bk.entries}));es.forEach(function(en){en.title=(name+'·'+en.title).slice(0,40);en.card=name;});ULORE=ULORE.concat(es);extra=es.length;}
  }catch(e){}
  uloreSave();
  var rxN=0;
  try{
    var rxs=(d.extensions&&d.extensions.regex_scripts)||d.regex_scripts;
    if(Array.isArray(rxs)&&rxs.length){var res2=uregexParse(JSON.stringify(rxs));res2.forEach(function(rr){rr.name=(name+'·'+rr.name).slice(0,40);});if(res2.length){UREGEX=UREGEX.concat(res2);uregexSave();rxN=res2.length;}}
  }catch(e){}
  S.loreMsg='已导入角色卡「'+name+'」'+(extra?('，附带世界书 '+extra+' 条'):'')+(rxN?('，正则 '+rxN+' 条'):'')+'。正文提及其名即自动登场。';
  if(S.overlay)renderOverlay();else render();
}
function cardImportFile(f){
  if(/\.png$/i.test(f.name||'')){
    var rd=new FileReader();
    rd.onload=function(){
      var tx=pngTextChunks(rd.result)||{};
      var raw=tx.chara||tx.ccv3;
      var js=raw?b64utf8(raw):null;var obj=null;try{obj=JSON.parse(js);}catch(e){}
      if(!obj){S.loreMsg='这张 PNG 里没有角色卡数据（需 SillyTavern 导出的角色卡 PNG）';if(S.overlay)renderOverlay();else render();return;}
      cardImportJson(obj);
    };
    rd.readAsArrayBuffer(f);
  }else{
    var rd2=new FileReader();
    rd2.onload=function(){var obj=null;try{obj=JSON.parse(String(rd2.result||''));}catch(e){}cardImportJson(obj);};
    rd2.readAsText(f);
  }
}

function parsePreset(txt,fname){
  var name=fname||'自定义预设';
  var obj=null; try{obj=JSON.parse(txt);}catch(e){}
  var entries=[];
  var MARKERS=['chatHistory','dialogueExamples','charDescription','charPersonality','scenario','personaDescription','worldInfoBefore','worldInfoAfter'];
  if(obj&&Array.isArray(obj.prompts)){
    if(obj.name)name=String(obj.name);
    var map={}; obj.prompts.forEach(function(p){if(p&&p.identifier)map[p.identifier]=p;});
    var order=null;
    if(Array.isArray(obj.prompt_order)&&obj.prompt_order.length){
      var best=obj.prompt_order[0];
      obj.prompt_order.forEach(function(o){if((o.order||[]).length>(best.order||[]).length)best=o;});
      order=best.order||[];
    }
    var seq=order?order:obj.prompts.map(function(p){return {identifier:p.identifier,enabled:p.enabled!==false};});
    var seen={},phase='pre';
    seq.forEach(function(o){
      var p=map[o.identifier]; if(!p||seen[o.identifier])return; seen[o.identifier]=1;
      if(p.marker||MARKERS.indexOf(p.identifier)>=0){ if(p.identifier==='chatHistory')phase='post'; return; }
      var c=String(p.content||'').trim(); if(!c)return;
      entries.push({name:String(p.name||p.identifier),content:c,pos:phase,on:o.enabled!==false&&p.enabled!==false});
    });
  }else if(obj&&(obj.content||obj.system_prompt||obj.sysprompt)){
    var c2=obj.content||obj.system_prompt||obj.sysprompt; if(typeof c2==='object')c2=c2.content||'';
    if(obj.name)name=String(obj.name);
    if(c2)entries.push({name:'系统提示词',content:String(c2).trim(),pos:'pre',on:true});
  }else if(String(txt||'').trim()){
    entries.push({name:'自定义提示词',content:String(txt).trim(),pos:'pre',on:true});
  }
  return entries.length?{name:name,on:true,entries:entries}:null;
}
function importPresetText(txt,name){
  var p=parsePreset(txt,name);
  if(p){PRESET=p;presetSave();S.pMsg='已导入「'+p.name+'」，共 '+p.entries.length+' 条提示词';}
  else{S.pMsg='无法识别的预设格式';}
  render();
}
function presetParts(pos){
  if(!PRESET||!PRESET.on)return [];
  return PRESET.entries.filter(function(e){return e.on&&e.pos===pos;}).map(function(e){return fill(e.content);});
}

function buildMessages(history,userInput){
  var msgs=[];
  var _effTxt='';try{var _ep=effUpTo(history);if(_ep)_effTxt=panelToText(_ep);}catch(e){} /* SHELL-DIAG：末幕原始面板是增量，替换为继承合并后的全量有效面板 */
  /* 长上下文瘦身：原文只带最近30条（极速模式仅8条），更早剧情已由编年长卷以编年纪要形式注入系统提示 */
  var _hcap=speedOn()?8:30;
  if(history.length>_hcap)history=history.slice(-_hcap);
  history.forEach(function(h,i){
    var lastWorld = h.role==='world' && i===history.length-1;
    var mc=h.text;
    if(h.role==='world'){mc=lastWorld?(stripMvu(mc)+(_effTxt?'\n\n'+_effTxt:'')):stripMvu(mc);mc=stripCoT(mc);mc=applyRegex(mc,'prompt');}
    msgs.push({role:h.role==='user'?'user':'assistant',content:mc});
  });
  msgs.push({role:'user',content:userInput});
  var merged=[];
  msgs.forEach(function(m){var last=merged[merged.length-1];if(last&&last.role===m.role)last.content+='\n\n'+m.content;else merged.push({role:m.role,content:m.content});});
  if(merged[0]&&merged[0].role==='assistant')merged.unshift({role:'user',content:'（开始）'});
  return merged;
}

/* 流式生成：SSE 增量回调；任何失败由调用方回退整段生成 */
function callCustomAIStream(system,messages,onDelta){
  var c=apiCur(),base=apiBase();
  var gT=genNum(API.gen&&API.gen.temp),gP=genNum(API.gen&&API.gen.topp),gM=genMax(),gEff=effortVal();
  if(S.chatOnly)gM=Math.min(gM,600); /* 聊天模式求快 */
  function gtune(b){return effTune(b,gT,gP,gEff);}
  PV={at:new Date().toLocaleTimeString(),provider:API.provider,model:c.model,system:system,messages:messages};
  function sse(url,opt,extract){
    try{if(opt&&!opt.signal)opt.signal=genSignal();}catch(e){}
    return fetch(url,opt).then(function(r){
      if(!r.ok)return r.text().then(function(t){var m=t;try{var j=JSON.parse(t);m=(j.error&&(j.error.message||j.error.type))||j.message||t;}catch(e2){}throw new Error('HTTP '+r.status+'：'+String(m).slice(0,220));});
      if(!r.body||!r.body.getReader)throw new Error('流式不可用');
      var rd=r.body.getReader(),dec=new TextDecoder('utf-8'),buf='',full='';
      function pump(){
        return rd.read().then(function(x){
          if(x.done)return full;
          buf+=dec.decode(x.value,{stream:true});
          var parts=buf.split('\n');buf=parts.pop();
          parts.forEach(function(ln){
            ln=ln.replace(/^data:\s?/,'').trim();
            if(!ln||ln==='[DONE]')return;
            try{var j=JSON.parse(ln);var d=extract(j)||'';if(d){full+=d;try{onDelta&&onDelta(full);}catch(e3){}}}catch(e){}
          });
          /* 流内复读掐断（R 移植）：末尾出现 1-12 字模式连刷 ≥30 次即停止拉流，止损 token */
          if(full.length>200&&/([\s\S]{1,12}?)\1{29,}$/.test(full)){try{rd.cancel();}catch(e4){}return full;}
          return pump();
        });
      }
      return pump();
    });
  }
  if(API.provider==='claude'){
    return sse(base+'/v1/messages',{method:'POST',headers:{'content-type':'application/json','x-api-key':c.key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify(gtune({model:c.model,max_tokens:gM,system:system,messages:messages,stream:true}))},
      function(j){return (j.type==='content_block_delta'&&j.delta&&j.delta.text)||'';});

    var contents=messages.map(function(m){return {role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]};});
    var gg=geminiThink((function(){var g={maxOutputTokens:gM,frequencyPenalty:0.6};if(gT!=null)g.temperature=gT;if(gP!=null)g.topP=gP;return g;})(),gEff);

      function(j){var cd=j.candidates&&j.candidates[0];return ((cd&&cd.content&&cd.content.parts)||[]).map(function(x){return x.text||'';}).join('');});
  }
  var url=/\/chat\/completions$/.test(base)?base:base+'/chat/completions';
  return sse(url,{method:'POST',headers:{'content-type':'application/json','authorization':'Bearer '+c.key},body:JSON.stringify(gtune({model:c.model,max_tokens:gM,stream:true,messages:[{role:'system',content:system}].concat(messages)}))},
    function(j){var ch=j.choices&&j.choices[0];return (ch&&ch.delta&&ch.delta.content)||'';});
}

function memFp(t){var h=5381,str=String(t||'').slice(0,120);for(var i=0;i<str.length;i++)h=((h<<5)+h+str.charCodeAt(i))|0;return h;}

function memSync(){

  for(var i=0;i<S.history.length;i++){

    if(h.role==='world'){worlds.push(h);acts.push(i>0&&S.history[i-1].role==='user'?S.history[i-1].text:'');}
  }
  var n=S.memN||0;
  if(worlds.length<n){S.memN=worlds.length;return;} // 历史被重开/回退
  var changed=false;
  // 重演此幕：条数未增但末条内容换了 → 更新末条
  if(worlds.length===n&&n>0&&S.mem.length&&S.mem[S.mem.length-1].fp!==memFp(worlds[n-1].text)&&!S.mem[S.mem.length-1].manual){

  }
  for(var j=n;j<worlds.length;j++){S.mem.push(memEntryOf(worlds[j],acts[j]));changed=true;}

function memChronicle(){
  var lines=S.mem.map(function(m,i){
    var head=(m.e||'')+(m.d?('·'+m.d):'');
    return (i+1)+'. '+(head?('『'+head+'』'):'')+(m.a?('玩家'+(m.manual?'手记':'之举')+'：'+m.a+'。'):'')+(m.s?('档案载：'+m.s):'');
  });
  var total=lines.join('\n');
  if(total.length<=7000)return total;
  var head=lines.slice(0,8),tail=[],used=head.join('\n').length+20;
  for(var i=lines.length-1;i>=8;i--){if(used+lines[i].length>7000)break;tail.unshift(lines[i]);used+=lines[i].length+1;}
  return head.join('\n')+'\n……（中略 '+(lines.length-8-tail.length)+' 条，已录于长卷）……\n'+tail.join('\n');
}

function giSettle(v,prev,u){

  if(m){

      if(cfg.d>0&&cfg.trace&&v.char['追踪']!=null){
        var T0=sdNum(prev.char['追踪']),T1=sdNum(v.char['追踪']);
        if(T0!=null&&T1!=null&&((cfg.trace>0&&T1<=T0)||(cfg.trace<0&&T1>=T0))){v.char['追踪']=sdSetNum(v.char['追踪'],Math.max(0,Math.min(100,T0+cfg.trace)));sdWarn('电子战追踪税未记，补记'+(cfg.trace>0?'+':'')+cfg.trace);}
      }
      if(/〔入侵判定骰 \d+／100·反噬/.test(u)&&v.char['追踪']!=null){
        var T2=sdNum(prev.char['追踪']),T3=sdNum(v.char['追踪']);
        if(T2!=null&&T3!=null&&T3<T2+25){v.char['追踪']=sdSetNum(v.char['追踪'],Math.min(100,T2+25));sdWarn('反噬税：追踪+25 引擎补记');}

    var P0=sdNum(prev.world['政局']),P1=sdNum(v.world['政局']);

function wizYearStr(y){return y<0?('前'+(-y)+'年'):(y+'年');}
function wizParseYear(t){t=String(t||'').trim();if(!t)return null;
  var neg=/^(公元)?前/.test(t)||/^-/.test(t);
  var n=parseInt(t.replace(/^公元/,'').replace(/^前/,'').replace(/^-/,'').replace(/年$/,''),10);
  if(isNaN(n)||n<=0)return null;
  return neg?-n:n;}
function wizYearOf(w){var py=wizParseYear(w&&w.customYear);
  if(py!=null)return py;
  return (w&&w.era!=null)?WIZ_ERAS[w.era].year:0;}
function wizNearestEra(y){var bi=0,bd=Infinity;for(var i=0;i<WIZ_ERAS.length;i++){var d=Math.abs(WIZ_ERAS[i].year-y);if(d<bd){bd=d;bi=i;}}return bi;}
function wizFigs(era){return era.figs.concat(WIZ_HOME);}
function wizChip(attr,val,label,on,sub){

    +(sub?'<div style="font-size:12px;line-height:1.7;color:var(--mut);margin-top:4px">'+esc(sub)+'</div>':'')+'</div>';
}

function wizGenerate(){
  var w=S.wiz;if(!w||w.busy)return;
  var era=WIZ_ERAS[w.era];var role=wizRoleDesc(w);var isT=!role;var wy=wizYearOf(w);
  if(!apiReady()){startCustomOpening(wizTemplate(w),role);return;}
  w.busy=true;w.err='';render();
  var sys='你是近世欧陆角色扮演游戏《攻殻機動隊》的开局撰写引擎。世界观：埃乌罗佩大陆的罗泽利亚——魔术与大炮并存、贵族与市民对立、战争与革命接踵而至的近世世界。主角三叶・克劳伯：银发蓝眼、被称作「诅咒人偶」的不死少女，天真絮叨、对死亡毫无实感。写作要求：模仿原作文风——短句、冷面幽默、惨剧与吐槽零时差并置，敬体对话+常体心声，恐怖从旁人的反应渗出，绝不说教绝不煽情；时代考据严格，名物、制度、称谓须符合近世欧陆与本作设定；人物绝不能知晓所选时间点之后的事（严禁未卜先知）；严禁现代元素（手机、电灯、汽车等）。';
  var req='请撰写一个开局场景，700-900字，第二人称「你」指玩家角色，以一个需要玩家表态或行动的瞬间收尾。\n\n玩家的选择：\n· 时代：'+era.label+'（'+wizYearStr(wy)+'）——'+era.blurb+(wy!==era.year?'（注意：玩家指定确切年份为'+wizYearStr(wy)+'，纪年与时局须严格落在该年）':'')+'\n· 开场地点：'+w.place+'\n· 在场人物：'+w.npcs.join('、')+'（须全部登场且言行符合其人）\n· 玩家扮演：'+(isT?'三叶・克劳伯本人（诅咒人偶少女）':role+'。注意：三叶本局是NPC，若她在场请依其人设演绎；若不在场，她的存在应作为世界背景被感知。')+'\n\n格式要求：第一行为【开局零·'+era.label+'（'+wizYearStr(wy)+'），'+w.place+'：（你起一个四到八字的标题）】，正文之后必须输出状态栏，严格采用如下骨架并填实每一项：\n\n'+wizPanelSkeleton(w.npcs,era,w.place,isT,wy);
  callCustomAI(sys,[{role:'user',content:req}]).then(function(text){
    text=String(text||'').trim();
    if(!text){throw new Error('生成结果为空');}
    if(text.indexOf('<gits_diag')<0)text+='\n\n'+wizPanelSkeleton(w.npcs,era,w.place,isT,wy);
    startCustomOpening(text,role);
  }).catch(function(err){
    w.busy=false;w.err='生成失败：'+(err&&err.message||err)+'（可重试，或稍后再试）';render();
  });
}
function startCustomOpening(text,role){
  var w=S.wiz;var era=WIZ_ERAS[w.era];var wy=wizYearOf(w);
  var m=/【开局零·[^：】]*：([^】]+)】/.exec(text);
  S.customOp={id:0,year:wy,era:era.label+'（'+wizYearStr(wy)+'），'+w.place,scene:m?m[1]:'自定义开局',text:text};
  S.customRole=role||null;
  S.openingId=0;S.mem=[];S.memN=0;S.wiz=null;
  S.history=[{role:'world',text:text,panel:parseMvu(text)}];
  S.screen='game';S.cmdHint=null;render();savePref();
  if(TH.available){try{
    if(TH.createChatMessages){Promise.resolve(TH.createChatMessages([{role:'assistant',message:text,is_user:false,name:'物语'}],{insert_at:'end'})).then(function(){pullHistory();}).catch(function(){});}
    else if(TH.triggerSlash){TH.triggerSlash('/sys '+JSON.stringify(text));setTimeout(pullHistory,800);}
  }catch(e){}}
}

function shareCode(){
  if(!S.customOp)return null;
  try{return btoa(unescape(encodeURIComponent(JSON.stringify({v:1,op:S.customOp,role:S.customRole||null}))));}catch(e){return null;}

function parseShareCode(txt){
  var clean=String(txt||'').replace(/\s+/g,'');
  var m=/op=([A-Za-z0-9+\/=]{40,})/.exec(clean)||/([A-Za-z0-9+\/=]{40,})/.exec(clean);
  if(!m)return null;
  try{
    var o=JSON.parse(decodeURIComponent(escape(atob(m[1]))));
    if(!o||!o.op||!o.op.text)return null;
    return o;
  }catch(e){return null;}
}

/* ===== PANEL_SPEC 仪表部件库：按 __GAME__.panelSpec 渲染主角仪表盘 =====

function psVal(v){var st=String(v==null?'':v).trim();var m=/(\d{1,3})/.exec(st);if(!m)return {n:null,note:st};var note=st.slice(m.index+m[1].length).replace(/^[·|(（\s]+/,'').replace(/[)）\s]+$/,'').trim();return {n:Math.max(0,Math.min(100,parseInt(m[1],10))),note:note};} /* §11.2 数值前置：83(左小腿·弹片) 坏一半也能渲染83 */
function psCap(caps,n){if(!caps||n==null)return '';var hit='';caps.forEach(function(c){if(n>=c[0])hit=c[1];});return hit;}
function psW(w,cc,cw,npcs){

  }
  return '';
}

var SDGW={on:false,list:[],t:0};
function sdDrawGW(c,t){
  var g=c.getContext('2d');if(!g)return;
  var lv=parseInt(c.getAttribute('data-gwlv'),10)||0;
  var W=c.width,H=c.height,mid=H/2;
  g.clearRect(0,0,W,H);
  g.globalAlpha=.16;g.strokeStyle='#3a5a6a';g.lineWidth=1;
  g.beginPath();g.moveTo(0,mid);g.lineTo(W,mid);g.stroke();
  g.globalAlpha=.92;g.lineWidth=1.3;g.strokeStyle=lv>=3?'#e04f9a':'#7fe3ff';
  g.beginPath();
  if(lv===4){ /* 断线：碎裂平线 */
    var gap=false;
    for(var x=0;x<=W;x+=6){if(Math.random()<.14)gap=!gap;if(!gap){g.moveTo(x,mid);g.lineTo(Math.min(W,x+6),mid);}}
  }else{
    var amp=[3,6,10,14][lv]||3,nz=[0,.18,.5,.85][lv]||0;
    for(var x2=0;x2<=W;x2+=2){
      var y=mid+Math.sin((x2+t*3.2)/11)*amp*(.6+.4*Math.sin((x2-t*2.1)/29))+(nz?(Math.random()*2-1)*amp*nz:0);
      if(x2===0)g.moveTo(0,y);else g.lineTo(x2,y);
    }
  }
  g.stroke();
}
function sdHydrate(){ /* 渲染后调用：驱动所有 ghostwave 画布（~14fps，无画布即自停） */
  var cvs=document.querySelectorAll('canvas.sd-gwcv');
  SDGW.list=[].slice.call(cvs);
  if(!SDGW.list.length){SDGW.on=false;return;}
  if(SDGW.on)return;
  SDGW.on=true;
  (function loop(){
    if(!SDGW.on)return;
    SDGW.t++;var alive=false;
    for(var i=0;i<SDGW.list.length;i++){var c=SDGW.list[i];if(!c.isConnected)continue;alive=true;try{sdDrawGW(c,SDGW.t);}catch(e){}}
    if(!alive){SDGW.on=false;return;}
    setTimeout(function(){try{requestAnimationFrame(loop);}catch(e){SDGW.on=false;}},70);
  })();
}
/* 渲染层 fx（§7.3）：Ghost 档位 → 0-100 噪声强度。数据层永不说谎，噪点只属于渲染层——UI 线拿此值驱动扫描线/字符错位 */
function sdFxLevel(p){
  try{
    var PS=(typeof G!=='undefined'&&G&&G.panelSpec)||null;
    if(!PS||!PS.fx||!p)return 0;
    var src=String((p.char&&p.char[PS.fx.src])||'').trim(),lvl=0;
    Object.keys(PS.fx.map||{}).forEach(function(k){if(src.indexOf(k)===0)lvl=PS.fx.map[k];});
    return lvl;
  }catch(e){return 0;}
}

function zjWglOn(){return false;} /* OPS.TERM：WGLASS WebGL 折射玻璃停用（§13.1 插槽机制保留，常规界面不用） */
function zjWglApply(){

  if(box)box.classList.add('wglBox');
  if(dm){dm.style.background='transparent';dm.style.webkitBackdropFilter='none';dm.style.backdropFilter='none';}
  WGLASS.open(function(){var b=document.getElementById('zjOvBox');if(!b)return[];var r=b.getBoundingClientRect();return [{x:r.left,y:r.top,w:r.width,h:r.height,rad:16}];},0.5);
}
function zjWglOff(){ if(window.WGLASS)WGLASS.close(); var gc=document.getElementById('zjGlass'); if(gc&&gc.parentNode!==document.body)document.body.appendChild(gc); }
function _scrKey(el){return el.tagName+'|'+(el.getAttribute('class')||'');}
function scrollCapture(root){var sv=[],cnt={},all=root.getElementsByTagName('*'),i,k;for(i=0;i<all.length;i++){k=_scrKey(all[i]);cnt[k]=(cnt[k]||0)+1;if(all[i].scrollTop||all[i].scrollLeft)sv.push([k,cnt[k]-1,all[i].scrollTop,all[i].scrollLeft]);}return sv;}
function scrollRestore(root,sv){if(!sv||!sv.length||!root)return;var all=root.getElementsByTagName('*'),cnt={},i,k;for(i=0;i<all.length;i++){k=_scrKey(all[i]);var n=(cnt[k]=(cnt[k]||0)+1)-1;for(var j=0;j<sv.length;j++){if(sv[j][0]===k&&sv[j][1]===n){all[i].scrollTop=sv[j][2];all[i].scrollLeft=sv[j][3];}}}}
function renderOverlay(){
  var box=document.getElementById('zjOvBox');
  if(!box||!S.overlay){render();return;}
  var tmp=document.createElement('div');
  tmp.innerHTML=overlayView();
  var fresh=tmp.querySelector('#zjOvBox');
  if(fresh){
    /* 重建前记住各滚动容器位置，重建后按「标签+类名+同类序号」原位恢复——
       不能按元素序号对位：胶囊等动态节点会让新旧DOM序号错位，导致画面弹回顶部 */
    function ovk(el){return el.tagName+'|'+(el.getAttribute('class')||'');}
    var sv=[],cnt={},all=box.getElementsByTagName('*'),i,k;
    for(i=0;i<all.length;i++){k=ovk(all[i]);cnt[k]=(cnt[k]||0)+1;
      if(all[i].scrollTop||all[i].scrollLeft)sv.push([k,cnt[k]-1,all[i].scrollTop,all[i].scrollLeft]);}
    box.innerHTML=fresh.innerHTML;
    var all2=box.getElementsByTagName('*'),cnt2={};
    for(i=0;i<all2.length;i++){k=ovk(all2[i]);var n2=(cnt2[k]=(cnt2[k]||0)+1)-1;
      for(var j=0;j<sv.length;j++){if(sv[j][0]===k&&sv[j][1]===n2){all2[i].scrollTop=sv[j][2];all2[i].scrollLeft=sv[j][3];}}}
    codexPills();setPills();zjWglApply();
  }else render();
}

   ['一 · 苏醒的诅咒人偶','585 年春末 · 布鲁洛兹家城馆','三叶本人（11 岁，刚苏醒、什么都不记得）','故事的最起点，没有「之前」——她生来是植物人、昏睡了十年，此刻一个转生者的灵魂住了进来、第一次睁开眼。','昏睡十年后突然睁眼，她不知道自己是谁；而身边的大人看她的眼神却满是恐惧。','父亲吉尔莫亚（布鲁洛兹公爵）、笑里藏针的继母米莉亚娜、监护人尼可所长'],

/* iMessage 式自增高输入框：随行数变高（到上限后内部滚动）。高度变了输入框变高，其毛玻璃（挂在输入框上、边缘固定像素淡出）也随之变高。
   打字快路径：行数没变（scrollHeight 与上次一致且不是删字）就一个字节都不改——旧实现每个按键都
   「height:auto→量→回写」强制两次重排，重页面手机上这就是打字延迟的 JS 大头。 */
function autoGrowInput(ta){
  ta=ta||document.getElementById('zjInput');if(!ta)return;
  var sh0=ta.scrollHeight,vl=ta.value.length; /* 干读：布局不脏时不触发重排 */
  if(ta._agSh===sh0&&ta._agVL!=null&&vl>=ta._agVL){ta._agVL=vl;return;}
  var _ph=null;if(!ta.value){_ph=ta.getAttribute('placeholder');if(_ph!=null)ta.removeAttribute('placeholder');}
  var max=isMobile()?128:150;
  ta.style.height='auto';var h=ta.scrollHeight;ta.style.height=Math.min(h,max)+'px';
  ta.style.overflowY=(h>max)?'auto':'hidden';
  if(_ph!=null)ta.setAttribute('placeholder',_ph);
  ta._agSh=ta.scrollHeight;ta._agVL=vl;
}

/* 灵动岛小球：从旧标签滑到新标签，抵达后小球自身「嗖」地绽放一圈柔光（box-shadow 扩散、无硬边贴图感），
   随即收束融入文字、该标签点亮——纯光晕扩散，不再是放大的贴图色块。 */
function tabIsleAnim(oldTab,newTab){
  var ball=document.getElementById('zjTabBall');
  if(!ball||!ball.animate)return;
  var oldPos=oldTab==='story'?'25%':'75%',newPos=newTab==='story'?'25%':'75%';
  ball.animate([{left:oldPos},{left:newPos}],{duration:330,easing:'cubic-bezier(.3,1.05,.3,1)'});
  setTimeout(function(){
    var b=document.getElementById('zjTabBall');
    if(b&&b.animate)b.animate([
      {boxShadow:'0 0 4px 1px rgba(125,255,176,.5)',offset:0},
      {boxShadow:'0 0 17px 5px rgba(150,180,230,.72)',offset:.32},
      {boxShadow:'0 0 44px 12px rgba(125,255,176,0)',offset:1}
    ],{duration:660,easing:'cubic-bezier(.22,.61,.3,1)'});
    var act=document.getElementById('zjTab_'+newTab);
    if(act&&act.animate)act.animate([
        {textShadow:'0 0 8px rgba(61,220,132,.3),0 1px 0 rgba(255,255,255,.6)'},
      {textShadow:'0 0 20px rgba(61,220,132,1),0 0 8px rgba(61,220,132,.9),0 1px 0 rgba(255,255,255,.6)',offset:.4},
      {textShadow:'0 0 12px rgba(61,220,132,.7),0 0 5px rgba(61,220,132,.5),0 1px 0 rgba(255,255,255,.6)'}
    ],{duration:600,easing:'ease-out'});
  },300);
}
